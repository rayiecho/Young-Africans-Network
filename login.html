<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="index, follow">
<meta name="description" content="Login to your Young Africans Network account — access your profile and community.">
<link rel="canonical" href="https://youngafricansnetwork.org/login.html">
<link rel="icon" href="/images/logo.jpeg" type="image/jpeg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<title>Login | Young Africans Network</title>
<style>
:root{--navy:#1B2A6B;--red:#E63329;--gold:#F5A623;--white:#FFFFFF;--light:#F8F9FF;--gray:#6B7280;--dark:#0D1B4B;}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Poppins',sans-serif;background:var(--light);color:var(--navy);min-height:100vh;display:flex;flex-direction:column;}

/* NAV */
nav{background:var(--white);box-shadow:0 2px 20px rgba(27,42,107,0.1);padding:0 2rem;height:75px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{display:flex;align-items:center;gap:0.75rem;text-decoration:none;}
.nav-logo img{height:48px;}
.nav-logo-text{font-size:0.9rem;font-weight:700;color:var(--navy);line-height:1.2;}
.nav-logo-text span{display:block;font-size:0.7rem;font-weight:400;color:var(--gray);}

/* MAIN */
.auth-wrapper{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 1.25rem;}
.auth-card{background:var(--white);border-radius:24px;padding:2.5rem;width:100%;max-width:440px;box-shadow:0 8px 40px rgba(0,0,0,0.08);}
.auth-logo{text-align:center;margin-bottom:1.5rem;}
.auth-logo img{height:72px;}
.auth-title{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:var(--navy);text-align:center;margin-bottom:0.4rem;}
.auth-sub{font-size:0.85rem;color:var(--gray);text-align:center;margin-bottom:2rem;line-height:1.6;}
.form-group{margin-bottom:1.1rem;}
.form-group label{display:block;font-size:0.78rem;font-weight:600;color:var(--navy);margin-bottom:0.4rem;}
.form-group input{width:100%;background:var(--light);border:1.5px solid rgba(27,42,107,0.15);color:var(--navy);padding:0.85rem 1rem;border-radius:10px;font-family:'Poppins',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.2s;}
.form-group input:focus{border-color:var(--navy);}
.forgot-link{text-align:right;font-size:0.75rem;margin-top:0.25rem;}
.forgot-link a{color:var(--red);font-weight:500;text-decoration:none;}
.btn-auth{width:100%;padding:0.9rem;background:var(--red);color:var(--white);font-family:'Poppins',sans-serif;font-size:0.95rem;font-weight:700;border:none;border-radius:50px;cursor:pointer;transition:all 0.3s;margin-top:0.5rem;}
.btn-auth:hover{background:var(--navy);}
.btn-auth:disabled{background:var(--gray);cursor:not-allowed;}
.auth-link{text-align:center;margin-top:1.25rem;font-size:0.82rem;color:var(--gray);}
.auth-link a{color:var(--navy);font-weight:600;text-decoration:none;}
.auth-link a:hover{color:var(--red);}
.error-msg{background:rgba(230,51,41,0.08);color:var(--red);border-radius:10px;padding:0.75rem 1rem;font-size:0.82rem;margin-bottom:1rem;display:none;}
.divider{text-align:center;color:var(--gray);font-size:0.78rem;margin:1.25rem 0;position:relative;}
.divider::before{content:'';position:absolute;left:0;top:50%;right:0;height:1px;background:rgba(27,42,107,0.1);}
.divider span{background:var(--white);padding:0 0.75rem;position:relative;}
.btn-community{width:100%;padding:0.85rem;background:var(--navy);color:var(--white);font-family:'Poppins',sans-serif;font-size:0.88rem;font-weight:600;border:none;border-radius:50px;cursor:pointer;transition:background 0.2s;text-decoration:none;display:block;text-align:center;}
.btn-community:hover{background:var(--dark);}

/* FOOTER */
footer{background:var(--navy);padding:1.5rem 2rem;text-align:center;}
.footer-copy{font-size:0.78rem;color:rgba(255,255,255,0.5);}
.footer-copy a{color:var(--gold);text-decoration:none;}

@media(max-width:480px){
  .auth-card{padding:1.75rem 1.25rem;}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <img src="images/logo.jpeg" alt="Young Africans Network Logo">
    <div class="nav-logo-text">Young Africans Network<span>Building the Future, Together</span></div>
  </a>
  <a href="register.html" style="font-size:0.82rem;font-weight:600;color:var(--navy);">No account? <span style="color:var(--red);">Register</span></a>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo"><img src="images/logo.jpeg" alt="YAN Logo"></div>
    <div class="auth-title">Welcome Back</div>
    <div class="auth-sub">Login to your Young Africans Network account 🌍</div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Your password">
      <div class="forgot-link"><a href="reset.html">Forgot password?</a></div>
    </div>

    <button class="btn-auth" id="loginBtn">Login to YAN 🚀</button>

    <div class="divider"><span>or</span></div>
    <a href="community.html" class="btn-community">Browse Community Without Account</a>

    <div class="auth-link">Don't have an account? <a href="register.html">Create one here</a></div>
  </div>
</div>

<footer>
  <div class="footer-copy">© 2026 Young Africans Network. All Rights Reserved. | <a href="index.html">Back to Website</a></div>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCs321YuksiFN3gUql_d880w48pf9Jq0Pk",
  authDomain: "young-africans-network.firebaseapp.com",
  projectId: "young-africans-network",
  storageBucket: "young-africans-network.firebasestorage.app",
  messagingSenderId: "224204618916",
  appId: "1:224204618916:web:8ddfd36c6f112b4912fa31"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// If already logged in, redirect
onAuthStateChanged(auth, (user) => {
  if (user) window.location.href = 'profile.html';
});

document.getElementById('loginBtn').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('errorMsg');
  errorEl.style.display = 'none';

  if (!email || !password) {
    errorEl.textContent = '❌ Please enter your email and password.';
    errorEl.style.display = 'block'; return;
  }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Logging in...';

  try {
    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = 'profile.html';
  } catch (err) {
    let msg = '❌ Login failed. Please try again.';
    if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') msg = '❌ Incorrect email or password.';
    if (err.code === 'auth/too-many-requests') msg = '❌ Too many attempts. Please try again later.';
    errorEl.textContent = msg;
    errorEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Login to YAN 🚀';
  }
});

// Enter key support
document.getElementById('password').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});
</script>
</body>
</html>
