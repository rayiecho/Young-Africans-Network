function checkAuth() {
  const auth = sessionStorage.getItem('yan_admin');
  if (auth !== 'true') {
    document.getElementById('screen-login').style.display = 'flex';
    document.getElementById('screen-dashboard').style.display = 'none';
  } else {
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-dashboard').style.display = 'flex';
    loadSection('overview');
  }
}

window.doAdminLogin = function() {

    sessionStorage.setItem('yan_admin', 'true');
    async function loadSystemErrors(c) {
  c.innerHTML = '<div class="loading">Loading errors...</div>';
  try {
    const [unresolvedSnap, allSnap] = await Promise.all([
      getDocs(query(collection(db, 'systemErrors'), where('resolved', '==', false), orderBy('createdAt', 'desc'), limit(50))),

    ]);

    const unresolved = unresolvedSnap.docs;
    const all = allSnap.docs;

    // Stats
    const critical = unresolved.filter(d => d.data().severity === 'error').length;

    let html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem;">';
    html += '<div class="stat-card red"><div class="stat-num">' + critical + '</div><div class="stat-label">Unresolved Errors</div></div>';
    html += '<div class="stat-card gold"><div class="stat-num">' + warnings + '</div><div class="stat-label">Warnings</div></div>';
    html += '<div class="stat-card navy"><div class="stat-num">' + all.length + '</div><div class="stat-label">Total Logged</div></div>';
    html += '</div>';

    // Actions
    html += '<div style="display:flex;gap:0.75rem;margin-bottom:1.5rem;flex-wrap:wrap;">';
    html += '<button onclick="resolveAllErrors()" style="background:#27AE60;color:#fff;border:none;padding:0.65rem 1.25rem;border-radius:50px;font-family:Poppins,sans-serif;font-weight:700;cursor:pointer;font-size:0.85rem;">✅ Mark All Resolved</button>';
    html += '<button onclick="loadSection(\'errors\')" style="background:var(--light);color:var(--navy);border:none;padding:0.65rem 1.25rem;border-radius:50px;font-family:Poppins,sans-serif;font-weight:700;cursor:pointer;font-size:0.85rem;">🔄 Refresh</button>';
    html += '</div>';

    if (unresolved.length === 0) {
      html += '<div class="section-card" style="text-align:center;padding:3rem;"><p style="font-size:2rem;">✅</p><p style="color:var(--gray);">No unresolved errors. System is healthy!</p></div>';
    } else {
      html += '<div class="section-card"><h3 style="font-size:1rem;font-weight:700;color:var(--red);margin-bottom:1rem;">🚨 Unresolved Errors (' + unresolved.length + ')</h3>';
      unresolved.forEach(d => {
        const e = d.data();
        const time = e.timestamp ? new Date(e.timestamp).toLocaleString() : '';
        const severityColor = e.severity === 'error' ? '#E63329' : '#F5A623';
        html += '<div style="background:var(--light);border-radius:12px;padding:1rem;margin-bottom:0.75rem;border-left:4px solid ' + severityColor + ';">';
        html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:0.5rem;margin-bottom:0.5rem;">';
        html += '<div><p style="font-size:0.88rem;font-weight:700;color:var(--navy);">' + sanitize(e.context || '') + '</p>';
        html += '<p style="font-size:0.75rem;color:var(--gray);">' + sanitize(e.userName || 'Anonymous') + ' · ' + time + '</p></div>';
        html += '<div style="display:flex;gap:0.5rem;align-items:center;">';
        html += '<span style="background:' + severityColor + '18;color:' + severityColor + ';padding:0.2rem 0.6rem;border-radius:50px;font-size:0.72rem;font-weight:700;">' + (e.severity || 'error').toUpperCase() + '</span>';
        html += '<button onclick="resolveError(\''+d.id+'\')" style="background:#27AE60;color:#fff;border:none;padding:0.3rem 0.75rem;border-radius:50px;font-family:Poppins,sans-serif;font-size:0.72rem;cursor:pointer;">Resolve</button>';
        html += '</div></div>';
        html += '<p style="font-size:0.82rem;color:var(--navy);background:white;padding:0.5rem 0.75rem;border-radius:8px;margin-bottom:0.35rem;font-family:monospace;">' + sanitize(e.message || '') + '</p>';

        html += '</div>';
      });

      html += '<div class="section-card"><h3 style="font-size:1rem;font-weight:700;color:#27AE60;margin-bottom:1rem;">✅ Recently Resolved (' + resolved.length + ')</h3>';

window.resolveError = async function(errorId) {
  await updateDoc(doc(db, 'systemErrors', errorId), { resolved: true, resolvedAt: serverTimestamp(), resolvedBy: 'Admin' });
  showToast('Error marked as resolved');
  loadSection('errors');
};

window.resolveAllErrors = async function() {
  if (!confirm('Mark all errors as resolved?')) return;
  const snap = await getDocs(query(collection(db, 'systemErrors'), where('resolved', '==', false)));
  const batch = [];
  snap.docs.forEach(d => batch.push(updateDoc(doc(db, 'systemErrors', d.id), { resolved: true, resolvedAt: serverTimestamp() })));
  await Promise.all(batch);
  showToast('All errors resolved!');
  loadSection('errors');
};

        html += '</div></div>';
        html += '<p style="font-size:0.82rem;color:var(--navy);margin-bottom:0.4rem;">' + sanitize(l.description||'').substring(0,150) + '...</p>';

        if (l.phone) html += '<p style="font-size:0.78rem;color:var(--gray);">📱 ' + sanitize(l.phone) + '</p>';
        if (l.imageUrl) html += '<img src="' + sanitize(l.imageUrl) + '" style="width:100%;max-height:150px;object-fit:cover;border-radius:8px;margin-top:0.5rem;" onerror="this.style.display='none'">';
        html += '</div>';
      });
      html += '</div>';
    } else {
      html += '<div class="section-card" style="text-align:center;padding:2rem;"><p style="font-size:2rem;">✅</p><p style="color:var(--gray);">No pending listings!</p></div>';
    }

    // Approved listings
    if (approvedSnap.size > 0) {
      html += '<div class="section-card"><h3 style="font-size:1rem;font-weight:700;color:var(--green);margin-bottom:1rem;">✅ Approved Listings (' + approvedSnap.size + ')</h3>';
      approvedSnap.docs.forEach(d => {
        const l = d.data();
        html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:0.6rem 0;border-bottom:1px solid var(--light);">';
        html += '<div><p style="font-size:0.85rem;font-weight:600;color:var(--navy);">' + sanitize(l.title||'') + '</p>';
        html += '<p style="font-size:0.75rem;color:var(--gray);">' + sanitize(l.sellerName||'') + ' · ' + sanitize(l.category||'') + ' · ⭐ ' + (l.reviewCount||0) + ' reviews</p></div>';
        html += '<button onclick="rejectLabListing('' + d.id + '')" style="background:var(--light);color:var(--red);border:1.5px solid var(--red);padding:0.3rem 0.75rem;border-radius:50px;font-family:Poppins,sans-serif;font-size:0.72rem;cursor:pointer;">Remove</button>';
        html += '</div>';
      });
      html += '</div>';
    }

    c.innerHTML = html;
  } catch(e) {
    c.innerHTML = '<p style="color:red;">Error: ' + e.message + '</p>';
  }
}

window.showToast = function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}
function timeAgo(ts) {
  if (!ts) return '';
  const t = ts.toMillis ? ts.toMillis() : (ts.seconds ? ts.seconds*1000 : ts);
  const diff = Math.floor((Date.now() - t) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}
function sanitize(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

async function uploadToCloudinary(file) {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLOUDINARY_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, { method: 'POST', body: fd });
  const data = await res.json();
  return data.secure_url || '';
}

async function approveRecLetter(recId, memberName, scholarship) {
  if (!confirm('Approve recommendation letter for ' + decodeURIComponent(memberName) + '?')) return;
  try {
    const recSnap = await getDoc(doc(db, 'recommendations', recId));
    const recData = recSnap.data();
    await updateDoc(doc(db,'recommendations',recId), {status:'approved', approvedAt: serverTimestamp(), approvedBy: 'YAN Admin'});
    const memberNameDecoded = decodeURIComponent(memberName || recData?.memberName || recData?.userName || 'Member');
    const scholarshipDecoded = decodeURIComponent(scholarship || recData?.scholarship || '');
    const deadline = recData?.deadline || 'as soon as possible';
    // Send in-app notification
    if (recData?.userId) {
      await addDoc(collection(db, 'notifications'), {
        title: 'Recommendation Letter Approved',
        message: 'Your recommendation letter for ' + scholarshipDecoded + ' has been approved. Go to Scholarships Hub to download it.',
        type: 'success', userId: recData.userId, postedBy: 'YAN Admin',
        createdAt: serverTimestamp(), readBy: []
      });
      // Send email
      const userSnap = await getDoc(doc(db, 'users', recData.userId));
      const userEmail = userSnap.exists() ? userSnap.data().email : null;
      if (userEmail) {
        const msg = 'Dear ' + memberNameDecoded + ',\n\n'
          + 'We are pleased to inform you that your request for a Recommendation Letter has been approved by the Young Africans Network Administration.\n\n'
          + 'SCHOLARSHIP / PROGRAM: ' + scholarshipDecoded + '\n'
          + 'DEADLINE: ' + deadline + '\n\n'
          + 'HOW TO DOWNLOAD YOUR LETTER:\n'
          + 'Visit youngafricansnetwork.org/community.html, go to Scholarships Hub, click the Recommendation Letter tab and click Download Letter.\n\n'
          + 'IMPORTANT NOTES:\n'
          + '- This is an official letter from Young Africans Network, signed by our administration.\n'
          + '- The letter confirms your active membership and standing within YAN.\n'
          + '- Please submit it before the deadline: ' + deadline + '\n'
          + '- For verification, scholarship committees may contact us at youngafricansnetwork.org\n\n'
          + 'We believe in you and your potential. Give this application everything you have — you are ready for this.\n\n'
          + 'Building the Future, Together.\n\n'
          + 'Warm regards,\nYAN Administration Office\nYoung Africans Network\n'
          + 'youngafricansnetwork.org | info@youngafricansnetwork.org';
        await fetch('https://yan-email-worker.youngafricansn.workers.dev', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
          to_email: userEmail, name: memberNameDecoded,
          subject: 'Your YAN Recommendation Letter Has Been Approved — ' + scholarshipDecoded,
          message: msg
        })});
      }
    }
    showToast('Approved! Member notified by email.');
    loadSection('recommendations');
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

function selectAllJoin() {

  const allChecked = [...checkboxes].every(c => c.checked);
  checkboxes.forEach(c => c.checked = !allChecked);

async function bulkApproveJoin() {
  const checked = document.querySelectorAll('.join-checkbox:checked');
  if (checked.length === 0) return showToast('Select at least one request', 'error');
  if (!confirm('Approve ' + checked.length + ' selected requests?')) return;
  for (const cb of checked) {
    await approveJoinRequest(cb.dataset.id, cb.dataset.email, cb.dataset.name);
  }
  showToast(checked.length + ' requests approved!');
  loadSection('forms');
}

async function bulkRejectJoin() {
  const checked = document.querySelectorAll('.join-checkbox:checked');
  if (checked.length === 0) return showToast('Select at least one request', 'error');
  if (!confirm('Reject ' + checked.length + ' selected requests?')) return;
  for (const cb of checked) {
    await rejectJoinRequest(cb.dataset.id, cb.dataset.email, cb.dataset.name);
  }
  showToast(checked.length + ' requests rejected');
  loadSection('forms');
}

window.addGalleryItem = async function() {
  const type = document.getElementById('gal-type').value;
  const caption = document.getElementById('gal-caption').value.trim();
  const category = document.getElementById('gal-category').value;
  let url = '';
  if (type === 'photo') {
    const file = document.getElementById('gal-photo').files[0];
    if (!file) return showToast('Select a photo', 'error');
    showToast('Uploading...');
    url = await uploadToCloudinary(file);
  } else {
    url = document.getElementById('gal-video-url').value.trim();
    if (!url) return showToast('Enter YouTube URL', 'error');
  }
  await addDoc(collection(db, 'gallery'), { type, url, caption, category, createdAt: serverTimestamp() });
  showToast('Gallery item added ');
  loadGalleryItems();
};

window.loadGalleryItems = async function loadGalleryItems() {
  const container = document.getElementById('gallery-list');
  if (!container) return;
  const snap = await getDocs(query(collection(db, 'gallery'), orderBy('createdAt', 'desc')));
  if (snap.empty) { container.innerHTML = '<p style="color:var(--gray);">No gallery items yet.</p>'; return; }
  container.innerHTML = snap.docs.map(d => {
    const g = d.data();
    const preview = g.type === 'photo'
      ? `<img src="${sanitize(g.url)}" alt="${sanitize(g.caption)}">`
      : `<div class="video-thumb"> ${sanitize(g.caption||'Video')}</div>`;
    return `
    <div class="gallery-item-card">
      ${preview}
      <div class="gallery-item-info">
        <p>${sanitize(g.caption||'')}</p>
        <span>${sanitize(g.category||'')} · ${sanitize(g.type)}</span>
      </div>
      <button class="btn-delete" onclick="deleteItem('gallery','${d.id}',window.loadGalleryItems)""></button>
    </div>`;
  }).join('');
}

  const container = document.getElementById('materials-list');

        + '<p style="font-size:0.78rem;color:var(--gray);"> Requested: '+date+'</p>'

        + '<div style="background:var(--light);border-radius:12px;padding:1rem;">'
        + '<p style="font-size:0.75rem;font-weight:700;color:var(--gray);margin-bottom:0.25rem;">DEPARTMENT</p>'
        + '<p style="font-size:0.88rem;font-weight:700;color:var(--navy);">'+(dept?.icon||'')+' '+(dept?.name||cert.department||'Unknown')+'</p>'
        + '</div>'
        + (cert.contribution ? '<div style="background:var(--light);border-radius:12px;padding:1rem;margin-bottom:1rem;"><p style="font-size:0.75rem;font-weight:700;color:var(--gray);margin-bottom:0.25rem;">CONTRIBUTION</p><p style="font-size:0.85rem;color:var(--navy);line-height:1.6;">' + sanitize(cert.contribution) + '</p></div>' : '')
        + (cert.achievements ? '<div style="background:var(--light);border-radius:12px;padding:1rem;margin-bottom:1rem;"><p style="font-size:0.75rem;font-weight:700;color:var(--gray);margin-bottom:0.25rem;">ACHIEVEMENTS</p><p style="font-size:0.85rem;color:var(--navy);line-height:1.6;">' + sanitize(cert.achievements) + '</p></div>' : '')

        + '<div style="background:var(--light);border-radius:12px;padding:1rem;">'
        + '<p style="font-size:0.75rem;font-weight:700;color:var(--gray);margin-bottom:0.25rem;">SCORE / GRADE</p>'

        + '</div>'

    });
  }

  c.innerHTML = html;

window.adminApproveCert = async function(certId) {
  const certSnap = await getDoc(doc(db, 'certificates', certId));
  const certData = certSnap.data();
  await updateDoc(doc(db, 'certificates', certId), { status: 'approved', approvedBy: 'Admin', approvedAt: serverTimestamp() });
  // Send email notification
  try {
    const userSnap = await getDoc(doc(db, 'users', certData.userId));
    const userEmail = userSnap.exists() ? userSnap.data().email : null;
    if (userEmail) {
      const certMsg = 'Dear ' + (certData.userName || 'Member') + ',\n\n'
        + 'Congratulations! We are thrilled to inform you that your Certificate of Achievement has been approved by the Young Africans Network Administration.\n\n'
        + 'PROGRAM COMPLETED: ' + (certData.programTitle || certData.department || 'YAN Program') + '\n'
        + 'CERTIFICATE ID: YAN-' + certData.userId.substring(0,8).toUpperCase() + '\n'
        + 'DATE ISSUED: ' + new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}) + '\n\n'
        + 'HOW TO DOWNLOAD YOUR CERTIFICATE:\n'
        + 'Visit youngafricansnetwork.org/community.html, go to My Profile, then click the Certificates tab and click Download.\n\n'
        + 'VERIFY YOUR CERTIFICATE:\n'
        + 'youngafricansnetwork.org/verify.html\n\n'
        + 'We encourage you to share this achievement on LinkedIn and with your network. You have worked hard for this and you deserve to celebrate it.\n\n'
        + 'This certificate is a testament to your dedication, leadership and commitment to excellence. We are proud to have you as a member of the Young Africans Network family.\n\n'
        + 'Building the Future, Together.\n\n'
        + 'Warm regards,\n'
        + 'YAN Administration Office\n'
        + 'Young Africans Network\n'
        + 'youngafricansnetwork.org | info@youngafricansnetwork.org';
      await fetch('https://yan-email-worker.youngafricansn.workers.dev', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        to_email: userEmail,
        name: certData.userName || 'Member',
        subject: 'Your YAN Certificate of Achievement Has Been Approved!',
        message: certMsg
      })});
    }
  } catch(e) { console.log('Certificate email error:', e); }
  if (certData?.userId) {
    await addDoc(collection(db, 'notifications'), {
      title: ' Certificate Approved!',
      message: 'Congratulations! Your certificate for ' + (certData.programTitle || 'your program') + ' has been approved. You can download it from your profile.',
      type: 'success',
      userId: certData.userId,
      postedBy: 'YAN Admin',
      createdAt: serverTimestamp(),
      readBy: []
    });
  }
  showToast('Certificate approved! ');
  loadSection('certificates');
};
window.adminRejectCert = async function(certId) {
  const certSnap = await getDoc(doc(db, 'certificates', certId));

  await updateDoc(doc(db, 'certificates', certId), { status: 'rejected', rejectedAt: serverTimestamp() });

      type: 'info',
      userId: certData.userId,
      postedBy: 'YAN Admin',
      createdAt: serverTimestamp(),
      readBy: []
    });
  }
  showToast('Certificate rejected');
  loadSection('certificates');
};

    html += '<div style="background:rgba(230,51,41,0.1);border-radius:12px;padding:1rem;flex:1;text-align:center;"><div style="font-size:1.5rem;font-weight:900;color:var(--red);">' + rejected.length + '</div><div style="font-size:0.78rem;color:var(--red);">Rejected</div></div>';

async function loadSystemErrors(c) {
  c.innerHTML = '<div class="loading">Loading errors...</div>';
  try {
    const [unresolvedSnap, allSnap] = await Promise.all([
      getDocs(query(collection(db, 'systemErrors'), where('resolved', '==', false), orderBy('createdAt', 'desc'), limit(50))),
      getDocs(query(collection(db, 'systemErrors'), orderBy('createdAt', 'desc'), limit(100)))
    ]);

    const unresolved = unresolvedSnap.docs;
    const all = allSnap.docs;

    // Stats
    const critical = unresolved.filter(d => d.data().severity === 'error').length;
    const warnings = unresolved.filter(d => d.data().severity === 'warning').length;

    let html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem;">';
    html += '<div class="stat-card red"><div class="stat-num">' + critical + '</div><div class="stat-label">Unresolved Errors</div></div>';
    html += '<div class="stat-card gold"><div class="stat-num">' + warnings + '</div><div class="stat-label">Warnings</div></div>';
    html += '<div class="stat-card navy"><div class="stat-num">' + all.length + '</div><div class="stat-label">Total Logged</div></div>';
    html += '</div>';

    // Actions
    html += '<div style="display:flex;gap:0.75rem;margin-bottom:1.5rem;flex-wrap:wrap;">';
    html += '<button onclick="resolveAllErrors()" style="background:#27AE60;color:#fff;border:none;padding:0.65rem 1.25rem;border-radius:50px;font-family:Poppins,sans-serif;font-weight:700;cursor:pointer;font-size:0.85rem;">✅ Mark All Resolved</button>';
    html += '<button onclick="loadSection(\'errors\')" style="background:var(--light);color:var(--navy);border:none;padding:0.65rem 1.25rem;border-radius:50px;font-family:Poppins,sans-serif;font-weight:700;cursor:pointer;font-size:0.85rem;">🔄 Refresh</button>';
    html += '</div>';

    if (unresolved.length === 0) {
      html += '<div class="section-card" style="text-align:center;padding:3rem;"><p style="font-size:2rem;">✅</p><p style="color:var(--gray);">No unresolved errors. System is healthy!</p></div>';
    } else {
      html += '<div class="section-card"><h3 style="font-size:1rem;font-weight:700;color:var(--red);margin-bottom:1rem;">🚨 Unresolved Errors (' + unresolved.length + ')</h3>';
      unresolved.forEach(d => {
        const e = d.data();
        const time = e.timestamp ? new Date(e.timestamp).toLocaleString() : '';
        const severityColor = e.severity === 'error' ? '#E63329' : '#F5A623';
        html += '<div style="background:var(--light);border-radius:12px;padding:1rem;margin-bottom:0.75rem;border-left:4px solid ' + severityColor + ';">';
        html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:0.5rem;margin-bottom:0.5rem;">';
        html += '<div><p style="font-size:0.88rem;font-weight:700;color:var(--navy);">' + sanitize(e.context || '') + '</p>';
        html += '<p style="font-size:0.75rem;color:var(--gray);">' + sanitize(e.userName || 'Anonymous') + ' · ' + time + '</p></div>';
        html += '<div style="display:flex;gap:0.5rem;align-items:center;">';
        html += '<span style="background:' + severityColor + '18;color:' + severityColor + ';padding:0.2rem 0.6rem;border-radius:50px;font-size:0.72rem;font-weight:700;">' + (e.severity || 'error').toUpperCase() + '</span>';
        html += '<button onclick="resolveError(\''+d.id+'\')" style="background:#27AE60;color:#fff;border:none;padding:0.3rem 0.75rem;border-radius:50px;font-family:Poppins,sans-serif;font-size:0.72rem;cursor:pointer;">Resolve</button>';
        html += '</div></div>';
        html += '<p style="font-size:0.82rem;color:var(--navy);background:white;padding:0.5rem 0.75rem;border-radius:8px;margin-bottom:0.35rem;font-family:monospace;">' + sanitize(e.message || '') + '</p>';
        if (e.stack) html += '<p style="font-size:0.72rem;color:var(--gray);font-family:monospace;white-space:pre-wrap;">' + sanitize(e.stack) + '</p>';
        html += '</div>';
      });
      html += '</div>';
    }

    // Recent resolved
    const resolved = all.filter(d => d.data().resolved);
    if (resolved.length > 0) {
      html += '<div class="section-card"><h3 style="font-size:1rem;font-weight:700;color:#27AE60;margin-bottom:1rem;">✅ Recently Resolved (' + resolved.length + ')</h3>';
      resolved.slice(0, 10).forEach(d => {
        const e = d.data();
        html += '<div style="display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid var(--light);">';
        html += '<p style="font-size:0.82rem;color:var(--gray);">' + sanitize(e.context || '') + ' — ' + sanitize(e.message || '').substring(0, 60) + '</p>';
        html += '<span style="font-size:0.72rem;color:#27AE60;">Resolved</span>';
        html += '</div>';
      });
      html += '</div>';
    }

    c.innerHTML = html;
  } catch(e) {
    c.innerHTML = '<p style="color:red;">Error loading system errors: ' + e.message + '</p>';
  }
}

    html += '</div>';

      const completed = progProgress.filter(x => (x.data().lessonsCompleted || []).length >= 20).length;
      const pct = enrolled > 0 ? Math.round((completed / enrolled) * 100) : 0;
      html += '<div style="display:flex;align-items:center;gap:1rem;padding:0.75rem 0;border-bottom:1px solid var(--light);">';

// ===== TOGGLE PROGRAM OPEN/CLOSE =====
window.toggleProgram = async function(colName, progId, isOpen) {
  try {
    await updateDoc(doc(db, colName, progId), { isOpen: isOpen });
    showToast(isOpen ? ' Program opened!' : ' Program closed!');
    loadSection('analytics');
  } catch(e) {
    showToast(e.message, 'error');
  }
};

          });

    html += '</div>';
    html += '</div>'; // end tab-content-quizzes

    // ===== TAB: GRADE RECORDS =====
    html += '<div id="tab-content-records" style="display:none;">';
    html += '<div class="section-card">';
    html += '<h3 style="font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:1rem;">🎓 Member Grade Records</h3>';

    if (gradeRecords.length === 0) {
      html += '<p style="color:var(--gray);font-size:0.85rem;">No grade records yet.</p>';
    } else {
      // Group by member
      const byMember = {};
      gradeRecords.forEach(g => {
        const key = g.userId || g.id;
        if (!byMember[key]) byMember[key] = [];
        byMember[key].push(g);
      });

      Object.values(byMember).forEach(memberRecords => {
        const firstName = memberRecords[0].userName || memberRecords[0].userId || 'Member';

            const assignFinal = assignData ? (assignData.finalScore || assignData.adminScore || assignData.aiScore || 0) : null;
            let modGrade = null;
            if (assignFinal !== null) {
              modGrade = Math.round(quizAvg * 0.6 + assignFinal * 0.4);
            } else if (quizAvg > 0) {
              modGrade = quizAvg;
            }
            if (modGrade !== null) moduleGrades.push(modGrade);
          });
          const overallGrade = moduleGrades.length > 0 ? Math.round(moduleGrades.reduce((s,v) => s+v, 0) / moduleGrades.length) : null;

          html += '<div style="background:white;border-radius:10px;padding:1rem;margin-bottom:1rem;">';
          html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;">';
          html += '<p style="font-size:0.82rem;font-weight:700;color:var(--navy);">📚 ' + sanitize(g.programId || '') + '</p>';

            html += '<div style="display:flex;align-items:center;gap:0.75rem;">';
            html += '<span style="background:' + overallColor + '18;color:' + overallColor + ';padding:0.3rem 0.8rem;border-radius:50px;font-size:0.82rem;font-weight:800;">Overall: ' + overallGrade + '%' + (passed ? ' ✅' : ' ❌') + '</span>';

            } else if (g.certificateApproved) {
              html += '<span style="background:#27AE6018;color:#27AE60;padding:0.3rem 0.8rem;border-radius:50px;font-size:0.75rem;font-weight:700;">🏆 Cert Approved</span>';
            }
            html += '</div>';
          }
          html += '</div>';

          // Per-module breakdown
          Object.entries(modules).forEach(([modKey, modData]) => {
            html += '<div style="background:rgba(27,42,107,0.03);border-radius:8px;padding:0.75rem;margin-bottom:0.5rem;">';
            html += '<p style="font-size:0.78rem;font-weight:700;color:var(--navy);margin-bottom:0.5rem;">' + modKey.replace('module-','Module ') + '</p>';

            // Quiz grades
            const quizGrades = modData.quizGrades || {};
            if (Object.keys(quizGrades).length > 0) {
              html += '<div style="display:flex;flex-wrap:wrap;gap:0.35rem;margin-bottom:0.5rem;">';
              Object.entries(quizGrades).forEach(([lk, qg]) => {
                const qc = qg.score >= 70 ? '#27AE60' : '#dc3545';
                html += '<span style="background:' + qc + '18;color:' + qc + ';padding:0.15rem 0.5rem;border-radius:50px;font-size:0.7rem;font-weight:700;" title="' + sanitize(lk) + '">';
                html += 'Q: ' + qg.score + '%</span>';
              });
              html += '</div>';
              html += '<p style="font-size:0.7rem;color:var(--gray);">Quiz avg: ' + (modData.quizAverage||0) + '%</p>';
            }

            // Assignment grade
            const ag = modData.assignmentGrade;
            if (ag) {
              html += '<div style="margin-top:0.5rem;padding:0.5rem;background:white;border-radius:6px;">';
              html += '<p style="font-size:0.72rem;font-weight:700;color:var(--navy);">Assignment</p>';
              html += '<div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.25rem;">';
              if (ag.aiScore) html += '<span style="font-size:0.7rem;color:#0A66C2;background:rgba(10,102,194,0.08);padding:0.15rem 0.5rem;border-radius:50px;">🤖 AI: ' + ag.aiScore + '%</span>';
              if (ag.adminScore) html += '<span style="font-size:0.7rem;color:var(--navy);background:rgba(27,42,107,0.08);padding:0.15rem 0.5rem;border-radius:50px;">✍️ Admin: ' + ag.adminScore + '%</span>';
              if (ag.finalScore) html += '<span style="font-size:0.7rem;color:#27AE60;background:rgba(39,174,96,0.1);padding:0.15rem 0.5rem;border-radius:50px;font-weight:700;">✅ Final: ' + ag.finalScore + '%</span>';
              if (ag.fileUrl) html += '<a href="' + ag.fileUrl + '" target="_blank" style="font-size:0.7rem;color:#0A66C2;text-decoration:underline;">📎 View File</a>';
              html += '</div>';
              if (ag.adminFeedback) html += '<p style="font-size:0.72rem;color:var(--gray);margin-top:0.35rem;font-style:italic;">' + sanitize(ag.adminFeedback) + '</p>';
              html += '</div>';
            }
            html += '</div>';
          });
          html += '</div>'; // end program card
        });
        html += '</div>'; // end member card
      });
    }
    html += '</div>';
    html += '</div>'; // end tab-content-records

    // ===== TAB: QUIZ FAILURES =====
    html += '<div id="tab-content-failures" style="display:none;">';
    html += '<div class="section-card"><h3 style="font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:1rem;">⚠️ Quiz Failures & Feedback (' + quizFails.size + ')</h3>';

window.overrideQuizScore = async function(gradeDocId, moduleKey, lessonKey) {
  const inputId = 'qoverride-' + gradeDocId + '-' + moduleKey + '-' + lessonKey;
  const val = parseInt(document.getElementById(inputId)?.value || '');
  if (isNaN(val) || val < 0 || val > 100) return showToast('Enter a score 0–100', 'error');
  try {
    const gradeRef = doc(db, 'memberGrades', gradeDocId);
    const gradeSnap = await getDoc(gradeRef);
    if (!gradeSnap.exists()) return showToast('Record not found', 'error');
    const data = gradeSnap.data();
    data.modules[moduleKey].quizGrades[lessonKey].adminScore = val;
    // Recalculate quiz average using admin scores where available
    const quizGrades = Object.values(data.modules[moduleKey].quizGrades);
    const quizAvg = Math.round(quizGrades.reduce(function(s, g) { return s + (g.adminScore || g.score); }, 0) / quizGrades.length);
    data.modules[moduleKey].quizAverage = quizAvg;
    data.updatedAt = serverTimestamp();
    await setDoc(gradeRef, data, {merge: true});
    showToast('Quiz score updated!');
    loadSection('assignments');
  } catch(e) { showToast(e.message, 'error'); }
};

window.approveCertificate = async function(gradeDocId, userId, programId) {
  if (!confirm('Approve certificate for ' + programId + '?')) return;
  try {
    await setDoc(doc(db, 'memberGrades', gradeDocId), { certificateApproved: true, certApprovedAt: serverTimestamp() }, {merge: true});
    // Fix gate: also mark certificateIssued in learningProgress so applyForProgram() unlocks
    if (userId && programId) {
      const lpId = userId + '_' + programId;
      await setDoc(doc(db, 'learningProgress', lpId), { certificateIssued: true, certificateApprovedAt: serverTimestamp() }, {merge: true});
      // Also check careerLearningProgress
      await setDoc(doc(db, 'careerLearningProgress', lpId), { certificateIssued: true, certificateApprovedAt: serverTimestamp() }, {merge: true}).catch(()=>{});
    }
    if (userId) {
      await addDoc(collection(db, 'notifications'), {
        title: '🏆 Certificate Approved!',
        message: 'Congratulations! Your certificate for ' + programId + ' has been approved by the YAN team. You can now download it from your profile.',
        type: 'success',
        userId: userId,
        postedBy: 'YAN Admin',
        createdAt: serverTimestamp(),
        readBy: []
      });
    }
    showToast('🏆 Certificate approved! Member notified.');
    loadSection('assignments');
  } catch(e) { showToast(e.message, 'error'); }
};

window.reviewAssignment = async function(colName, assignId, status, userId, programId, lessonId) {
  const feedback = document.getElementById('feedback-' + assignId)?.value || '';
  const adminScoreVal = parseInt(document.getElementById('admin-score-' + assignId)?.value || '');
  const adminScore = isNaN(adminScoreVal) ? null : adminScoreVal;
  if (status === 'approved' && adminScore === null) {
    return showToast('Please enter a final score before approving', 'error');
  }
  try {
    const assignSnap = await getDoc(doc(db, colName, assignId));
    const assignData = assignSnap.data();
    const uid = userId || assignData?.userId;
    const pid = programId || assignData?.programId;
    const lid = lessonId || assignData?.lessonId;

    await updateDoc(doc(db, colName, assignId), {
      status: status,
      feedback: feedback,
      adminScore: adminScore,
      reviewedAt: serverTimestamp(),
      reviewedBy: 'Admin'
    });

    // Update memberGrades with admin score and final score
    if (uid && pid && lid) {
      const gradeId = uid + '_' + pid;
      const gradeRef = doc(db, 'memberGrades', gradeId);
      const gradeSnap = await getDoc(gradeRef);
      if (gradeSnap.exists()) {
        const gradeData = gradeSnap.data();
        const parts = lid.split('-');
        const moduleKey = 'module-' + (parts[1] || '1');
        if (gradeData.modules && gradeData.modules[moduleKey] && gradeData.modules[moduleKey].assignmentGrade) {
          gradeData.modules[moduleKey].assignmentGrade.adminScore = adminScore;
          gradeData.modules[moduleKey].assignmentGrade.adminFeedback = feedback;
          gradeData.modules[moduleKey].assignmentGrade.finalScore = adminScore;
          gradeData.modules[moduleKey].assignmentGrade.status = status;
          // Recalculate module grade
          const quizAvg = gradeData.modules[moduleKey].quizAverage || 0;
          if (adminScore !== null) {
            gradeData.modules[moduleKey].moduleGrade = Math.round(quizAvg * 0.6 + adminScore * 0.4);
          }
          // Recalculate overall grade
          const modGrades = Object.values(gradeData.modules)
            .map(m => m.moduleGrade)
            .filter(v => v !== undefined && v !== null);
          if (modGrades.length > 0) {
            gradeData.overallGrade = Math.round(modGrades.reduce((s,v) => s+v, 0) / modGrades.length);
            gradeData.passed = gradeData.overallGrade >= 70;
          }
          gradeData.updatedAt = serverTimestamp();
          await setDoc(gradeRef, gradeData, {merge: true});
        }
      }
    }

    // Notify member
    if (uid) {
      await addDoc(collection(db, 'notifications'), {
        title: status === 'approved' ? '✅ Assignment Approved!' : '📝 Assignment Feedback',
        message: status === 'approved'
          ? 'Your assignment for ' + (pid || 'your program') + ' has been approved! Final score: ' + (adminScore !== null ? adminScore + '%.' : '') + (feedback ? ' Feedback: ' + feedback : ' Great work!')
          : 'Your assignment for ' + (pid || 'your program') + ' needs revision. ' + (feedback ? 'Feedback: ' + feedback : 'Please review and resubmit.'),
        type: status === 'approved' ? 'success' : 'info',
        userId: uid,
        postedBy: 'YAN Admin',
        createdAt: serverTimestamp(),
        readBy: []
      });
    }
    // Issue certificate if approved and it's a program assignment
    if (status === 'approved' && uid && pid) {
      try {
        const progRef = doc(db, 'trainingPrograms', pid);
        let progSnap = await getDoc(progRef);
        if (!progSnap.exists()) progSnap = await getDoc(doc(db, 'careerPrograms', pid));
        const title = progSnap.exists() ? (progSnap.data().title || pid) : pid;
        const totalModules = progSnap.exists() ? (progSnap.data().modules || 1) : 1;
        const modNum = lid ? parseInt((lid.split('-lesson-')[0] || '').replace('module-','')) || 1 : 1;
        if (modNum >= totalModules) {
          // Get member name
          const userSnap = await getDoc(doc(db, 'users', uid));
          const userName = userSnap.exists() ? userSnap.data().name : 'Member';
          // Mark program as completed
          await setDoc(doc(db, 'learningProgress', uid + '_' + pid), {
            userId: uid, programId: pid, programTitle: title,
            status: 'completed', certificateIssued: true,
            completedAt: serverTimestamp()
          }, {merge: true});
          // Issue certificate
          await setDoc(doc(db, 'certificates', uid + '_' + pid), {
            userId: uid, userName: userName,
            programId: pid, programTitle: title,
            department: 'programs', status: 'approved',
            issuedAt: serverTimestamp(), type: 'program'
          });
          // Notify member about certificate
          await addDoc(collection(db, 'notifications'), {
            title: '🎓 Certificate Issued!',
            message: 'Congratulations! Your certificate for ' + title + ' has been issued. Go to My Grades to download it.',
            type: 'success', userId: uid,
            postedBy: 'YAN Admin',
            createdAt: serverTimestamp(), readBy: []
          });
        }
      } catch(certErr) { console.log('Cert error:', certErr); }
    }
    showToast(status === 'approved' ? '✅ Assignment approved! Member notified.' : '📝 Revision requested. Member notified.');
    loadSection('assignments');
  } catch(e) {
    showToast(e.message, 'error');
  }
};

window.fillNotifTemplate = function(btn) {
  document.getElementById('notif-title-admin').value = btn.dataset.title || '';
  document.getElementById('notif-message-admin').value = btn.dataset.msg || '';
};

window.sendAdminNotification = async function() {
  const title = document.getElementById('notif-title-admin').value.trim();
  const message = document.getElementById('notif-message-admin').value.trim();
  const type = document.getElementById('notif-type-admin').value;
  const audience = document.getElementById('notif-audience').value;

  if (!title || !message) return showToast('Enter title and message', 'error');

  try {
    const notifData = {
      title, message, type,
      audience: audience,
      postedBy: 'YAN Admin',
      createdAt: serverTimestamp(),
      readBy: []
    };

    if (audience !== 'all') notifData.department = audience;

    await addDoc(collection(db, 'notifications'), notifData);
    showToast(' Notification sent successfully!');
    document.getElementById('notif-title-admin').value = '';
    document.getElementById('notif-message-admin').value = '';
    loadSection('notifications');
  } catch(e) {
    showToast(e.message, 'error');
  }
};

window.deleteNotification = async function(notifId) {
  if (!confirm('Delete this notification?')) return;
  await deleteDoc(doc(db, 'notifications', notifId));
  showToast('Notification deleted');
  loadSection('notifications');
};

async function loadFinance(c) {
  c.innerHTML = '<div class="loading">Loading finance data...</div>';
  try {
    const [incomeSnap, expenseSnap, loanSnap] = await Promise.all([
      getDocs(query(collection(db, 'financeIncome'), orderBy('date', 'desc'))),
      getDocs(query(collection(db, 'financeExpenses'), orderBy('date', 'desc'))),
      getDocs(query(collection(db, 'financeLoans'), orderBy('date', 'desc')))

    const income = incomeSnap.docs.map(d => ({...d.data(), id: d.id}));

window.saveFinanceEntry = async function(type) {
  const date = document.getElementById('fin-date').value;
  const amount = document.getElementById('fin-amount').value;
  const category = document.getElementById('fin-category').value;
  const description = document.getElementById('fin-desc').value;
  if (!date||!amount||!description) return showToast('Fill all required fields','error');
  const colName = type==='income'?'financeIncome':type==='loan'?'financeLoans':'financeExpenses';
  const data = {date, amount:parseFloat(amount), category, description, createdBy:'Admin', createdAt:serverTimestamp()};
  if (type==='loan') { data.lender=document.getElementById('fin-lender')?.value||''; data.dueDate=document.getElementById('fin-due')?.value||''; data.status='pending'; data.purpose=description; }
  if (type==='expense') {
    const fi = document.getElementById('fin-receipt');
    if (fi?.files[0]) { try { data.receiptUrl = await uploadToCloudinary(fi.files[0]); } catch(e) {} }
  }
  await addDoc(collection(db,colName), data);
  showToast(type==='income'?' Income recorded!':type==='loan'?' Loan recorded!':' Expense recorded!');
  loadSection('finance');
};

window.deleteFinanceEntry = async function(colName, id) {

  await deleteDoc(doc(db,colName,id));
  showToast('Entry deleted');
  loadSection('finance');
};

window.generateBalanceSheet = async function() {
  const [iS,eS,lS] = await Promise.all([getDocs(collection(db,'financeIncome')),getDocs(collection(db,'financeExpenses')),getDocs(collection(db,'financeLoans'))]);
  const inc = iS.docs.map(d=>d.data()), exp = eS.docs.map(d=>d.data()), lns = lS.docs.map(d=>d.data());
  const tI=inc.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  const tE=exp.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  const tL=lns.filter(l=>l.status!=='repaid').reduce((s,l)=>s+(parseFloat(l.amount)||0),0);
  const net=tI-tE-tL;
  const now=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  const w=window.open('','_blank','width=700,height=900');
  w.document.write('<html><head><title>YAN Balance Sheet</title><style>body{font-family:Arial,sans-serif;padding:40px;color:#1B2A6B;}table{width:100%;border-collapse:collapse;}td,th{padding:8px;border-bottom:1px solid #e0e0e0;}th{background:#f8f9ff;}.tot{font-weight:900;background:#f8f9ff;}.pos{color:#27AE60;font-weight:900;}.neg{color:#E63329;font-weight:900;}@media print{button{display:none;}}</style></head><body>');
  w.document.write('<h1> Young Africans Network — Balance Sheet</h1><p>As at '+now+'</p>');
  w.document.write('<h3> Income</h3><table><tr><th>Date</th><th>Description</th><th>Category</th><th style="text-align:right;">KES</th></tr>');
  inc.forEach(i=>w.document.write('<tr><td>'+(i.date||'')+'</td><td>'+(i.description||'')+'</td><td>'+(i.category||'')+'</td><td style="text-align:right;">'+parseFloat(i.amount||0).toLocaleString()+'</td></tr>'));
  w.document.write('<tr class="tot"><td colspan="3">TOTAL INCOME</td><td style="text-align:right;" class="pos">KES '+tI.toLocaleString()+'</td></tr></table>');

  w.document.write('<tr class="tot"><td colspan="3">TOTAL OUTSTANDING</td><td style="text-align:right;" class="neg">KES '+tL.toLocaleString()+'</td></tr></table>');
  w.document.write('<h3> Net Position</h3><table><tr><td>Total Income</td><td style="text-align:right;" class="pos">KES '+tI.toLocaleString()+'</td></tr><tr><td>Less: Expenses</td><td style="text-align:right;" class="neg">KES '+tE.toLocaleString()+'</td></tr><tr><td>Less: Outstanding Loans</td><td style="text-align:right;" class="neg">KES '+tL.toLocaleString()+'</td></tr><tr class="tot"><td>NET POSITION</td><td style="text-align:right;" class="'+(net>=0?'pos':'neg')+'">KES '+net.toLocaleString()+'</td></tr></table>');

window.saveEditProgram = async function(colName, progId) {
  const title = document.getElementById('edit-prog-title').value.trim();
  const description = document.getElementById('edit-prog-desc').value.trim();
  const category = document.getElementById('edit-prog-cat').value.trim();
  const duration = document.getElementById('edit-prog-dur').value.trim();
  const level = document.getElementById('edit-prog-level').value;
  const modules = parseInt(document.getElementById('edit-prog-modules').value)||4;
  const skillsRaw = document.getElementById('edit-prog-skills').value.trim();
  const skills = skillsRaw ? skillsRaw.split(',').map(s=>s.trim()).filter(s=>s) : [];
  if (!title) return showToast('Title is required','error');
  try {
    await updateDoc(doc(db,colName,progId),{title,description,category,duration,level,modules,skills,updatedAt:serverTimestamp()});
    showToast(' Program updated!');
    loadSection('programs');
  } catch(e) { showToast(e.message,'error'); }
};

window.deleteProgram = async function(colName, progId) {
  if (!confirm('Delete this program? This cannot be undone.')) return;
  try {
    await deleteDoc(doc(db, colName, progId));
    showToast('Program deleted');
    loadSection('programs');
  } catch(e) {
    showToast(e.message, 'error');
  }
};

window.approveApplication = async function(appId, userIdEnc, programIdEnc, programTitleEnc, emailEnc, nameEnc) {
  const userId = decodeURIComponent(userIdEnc);
  const programId = decodeURIComponent(programIdEnc);
  const programTitle = decodeURIComponent(programTitleEnc);
  const email = decodeURIComponent(emailEnc);
  const name = decodeURIComponent(nameEnc);
  if (!confirm('Approve application for ' + name + ' — ' + programTitle + '?')) return;
  try {
    // Update application status
    await updateDoc(doc(db,'programApplications',appId), {
      status: 'approved', approvedAt: serverTimestamp(), approvedBy: 'Admin'
    });
    // Get program data - check both training and career
    const appSnap = await getDoc(doc(db,'programApplications',appId));
    const programType = appSnap.data().programType || 'training';
    const colName = programType === 'career' ? 'careerPrograms' : 'trainingPrograms';
    const progressCol = programType === 'career' ? 'careerLearningProgress' : 'learningProgress';
    const progSnap = await getDoc(doc(db,colName,programId));
    const progData = progSnap.data();
    // Enroll the member
    const enrolledBy = progData.enrolledBy || [];
    if (!enrolledBy.includes(userId)) {
      enrolledBy.push(userId);
      await updateDoc(doc(db,colName,programId), {enrolledBy});
    }
    await setDoc(doc(db,progressCol, userId + '_' + programId), {
      userId, programId, programTitle,
      status: 'enrolled', progress: 0,
      modulesCompleted: [], enrolledAt: serverTimestamp()
    }, {merge: true});
    // Send in-app notification
    await addDoc(collection(db,'notifications'), {
      title: 'Application Approved!',
      message: 'Congratulations! Your application for ' + programTitle + ' has been approved. Go to Tech Hub to start learning!',
      type: 'success', userId, postedBy: 'YAN Admin',
      createdAt: serverTimestamp(), readBy: []
    });
    // Send email
    if (email) {
      const msg = 'Dear ' + name + ',\n\n'
        + 'Congratulations! We are thrilled to inform you that your application for the following program has been APPROVED:\n\n'
        + 'PROGRAM: ' + programTitle + '\n\n'
        + 'Your learning journey at Young Africans Network begins now! Here is how to get started:\n\n'
        + '1. Log in to youngafricansnetwork.org/community.html\n'
        + '2. Go to Tech Hub in the sidebar\n'
        + '3. Click on Learning Paths\n'
        + '4. Find your program and click Continue\n\n'
        + 'We reviewed your application and were impressed by your motivation and commitment. We believe you have what it takes to complete this program and make an impact.\n\n'
        + 'Give it your best — we are rooting for you!\n\n'
        + 'Building the Future, Together.\n\n'
        + 'Warm regards,\nYAN Administration Office\n'
        + 'Young Africans Network\n'
        + 'youngafricansnetwork.org | info@youngafricansnetwork.org';
      await fetch('https://yan-email-worker.youngafricansn.workers.dev', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        to_email: email, name,
        subject: 'Congratulations! Your YAN Program Application is Approved — ' + programTitle,
        message: msg
      })});
    }
    showToast('Application approved! Member enrolled and notified.');
    loadSection('applications');
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
};

window.rejectApplication = async function(appId, emailEnc, nameEnc, programTitleEnc) {
  const email = decodeURIComponent(emailEnc);
  const name = decodeURIComponent(nameEnc);
  const programTitle = decodeURIComponent(programTitleEnc);
  const feedback = prompt('Provide feedback for rejection (this will be sent to the member):');
  if (!feedback) return;
  try {
    await updateDoc(doc(db,'programApplications',appId), {
      status: 'rejected', rejectedAt: serverTimestamp(),
      rejectionFeedback: feedback, rejectedBy: 'Admin'
    });
    // Get userId from app
    const appSnap = await getDoc(doc(db,'programApplications',appId));
    const userId = appSnap.data().userId;
    // In-app notification
    await addDoc(collection(db,'notifications'), {
      title: 'Application Update',
      message: 'Your application for ' + programTitle + ' was not approved at this time. Feedback: ' + feedback,
      type: 'info', userId, postedBy: 'YAN Admin',
      createdAt: serverTimestamp(), readBy: []
    });
    // Send email
    if (email) {
      const msg = 'Dear ' + name + ',\n\n'
        + 'Thank you for applying to the ' + programTitle + ' at Young Africans Network.\n\n'
        + 'After careful review of your application, we are unable to approve your enrollment at this time.\n\n'
        + 'FEEDBACK FROM OUR TEAM:\n' + feedback + '\n\n'
        + 'This does not mean the end of your journey with us. Here is what we recommend:\n\n'
        + '- Continue being active in your YAN hub\n'
        + '- Build on the areas mentioned in the feedback above\n'
        + '- You are welcome to reapply in the future when you feel ready\n\n'
        + 'We appreciate your interest in growing with Young Africans Network and we encourage you to keep pushing forward.\n\n'
        + 'Building the Future, Together.\n\n'
        + 'Warm regards,\nYAN Administration Office\n'
        + 'Young Africans Network\n'
        + 'youngafricansnetwork.org | info@youngafricansnetwork.org';
      await fetch('https://yan-email-worker.youngafricansn.workers.dev', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        to_email: email, name,
        subject: 'YAN Program Application Update — ' + programTitle,
        message: msg
      })});
    }
    showToast('Application rejected. Member notified with feedback.');
    loadSection('applications');
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
};

</script>

.admin-nav{padding:1rem 0;flex:1;}
.nav-item{display:flex;align-items:center;gap:0.75rem;padding:0.8rem 1.25rem;color:rgba(255,255,255,0.6);font-size:0.82rem;font-weight:500;cursor:pointer;transition:all 0.2s;border:none;background:none;width:100%;text-align:left;}
.nav-item:hover{color:var(--white);background:rgba(255,255,255,0.06);}
.nav-item.active{color:var(--white);background:rgba(255,255,255,0.12);border-left:3px solid var(--gold);}
.nav-item .nav-icon{font-size:1rem;width:22px;text-align:center;}
.nav-group{margin-bottom:0.25rem;}
.nav-group-header{display:flex;justify-content:space-between;align-items:center;width:100%;text-align:left;padding:0.7rem 1.25rem;border:none;background:none;color:rgba(255,255,255,0.5);font-family:'Poppins',sans-serif;font-size:0.75rem;font-weight:700;cursor:pointer;letter-spacing:0.05em;text-transform:uppercase;}
.nav-group-header:hover{color:rgba(255,255,255,0.8);}
.nav-group-items{border-left:2px solid rgba(255,255,255,0.08);margin-left:1.5rem;}
.nav-sub{padding:0.6rem 1rem !important;font-size:0.78rem !important;}
.nav-arrow{font-size:0.6rem;transition:transform 0.2s;opacity:0.5;}
.nav-arrow.open{transform:rotate(90deg);}
.admin-sidebar-footer{padding:1rem 1.25rem;border-top:1px solid rgba(255,255,255,0.08);}
.btn-logout-admin{display:flex;align-items:center;gap:0.5rem;color:rgba(255,255,255,0.5);font-size:0.82rem;background:none;border:none;cursor:pointer;padding:0.5rem;transition:color 0.2s;}
.btn-logout-admin:hover{color:var(--red);}

/* MAIN */
.admin-main{margin-left:var(--sidebar);display:flex;flex-direction:column;min-height:100vh;}
.admin-topbar{background:var(--white);padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(27,42,107,0.08);position:sticky;top:0;z-index:40;}
.admin-topbar-left{display:flex;align-items:center;gap:1rem;}
.admin-topbar-left h1{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:900;color:var(--navy);}
#section-title{font-size:0.88rem;color:var(--gray);}
.admin-topbar-right a{font-size:0.82rem;color:var(--navy);text-decoration:none;padding:0.5rem 1rem;border-radius:8px;border:1px solid rgba(27,42,107,0.15);}
.admin-topbar-right a:hover{background:var(--light);}
#content-area{padding:2rem;max-width:1100px;}

/* SECTION CARDS */
.section-card{background:var(--white);border-radius:16px;padding:1.75rem;margin-bottom:1.5rem;box-shadow:0 2px 12px rgba(0,0,0,0.05);}
.section-card h3{font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:1.25rem;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.25rem;}
.form-group label{display:block;font-size:0.78rem;font-weight:600;color:var(--navy);margin-bottom:0.4rem;}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--light);border:1.5px solid rgba(27,42,107,0.15);color:var(--navy);padding:0.7rem 1rem;border-radius:10px;font-family:'Poppins',sans-serif;font-size:0.85rem;outline:none;transition:border-color 0.2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--navy);}
.btn-primary{background:var(--red);color:var(--white);padding:0.75rem 2rem;border-radius:50px;font-family:'Poppins',sans-serif;font-size:0.9rem;font-weight:700;border:none;cursor:pointer;transition:all 0.2s;}
.btn-primary:hover{background:var(--navy);}
.btn-delete{background:rgba(230,51,41,0.1);color:var(--red);border:none;padding:0.4rem 0.85rem;border-radius:8px;font-family:'Poppins',sans-serif;font-size:0.78rem;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.btn-delete:hover{background:var(--red);color:var(--white);}
.btn-approve{background:rgba(39,174,96,0.1);color:var(--green);border:none;padding:0.4rem 0.85rem;border-radius:8px;font-family:'Poppins',sans-serif;font-size:0.78rem;font-weight:600;cursor:pointer;white-space:nowrap;}
.btn-approve:hover{background:var(--green);color:var(--white);}
.btn-sm-action{background:var(--light);color:var(--navy);border:1px solid rgba(27,42,107,0.15);padding:0.35rem 0.75rem;border-radius:8px;font-family:'Poppins',sans-serif;font-size:0.72rem;cursor:pointer;white-space:nowrap;}
.btn-sm-action:hover{background:var(--navy);color:var(--white);}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;margin-bottom:1.5rem;}
.stat-card{border-radius:16px;padding:1.5rem;text-align:center;}
.stat-card.navy{background:var(--navy);}
.stat-card.red{background:var(--red);}
.stat-card.gold{background:var(--gold);}
.stat-num{font-family:'Playfair Display',serif;font-size:2.5rem;font-weight:900;color:var(--white);line-height:1;}
.stat-label{font-size:0.75rem;color:rgba(255,255,255,0.75);text-transform:uppercase;letter-spacing:0.5px;margin-top:0.25rem;}
.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;}
.overview-card{background:var(--white);border-radius:16px;padding:1.5rem;box-shadow:0 2px 12px rgba(0,0,0,0.05);}
.overview-card h3{font-size:0.95rem;font-weight:700;color:var(--navy);margin-bottom:1rem;}
.quick-actions{display:flex;flex-wrap:wrap;gap:0.5rem;}
.btn-quick{background:var(--light);color:var(--navy);border:1.5px solid rgba(27,42,107,0.15);padding:0.5rem 1rem;border-radius:50px;font-family:'Poppins',sans-serif;font-size:0.78rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
.btn-quick:hover{background:var(--navy);color:var(--white);border-color:var(--navy);}

/* GALLERY GRID */
.gallery-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-top:1rem;}
.gallery-item-card{border-radius:12px;overflow:hidden;background:var(--light);position:relative;}
.gallery-item-card img{width:100%;height:140px;object-fit:cover;display:block;}
.video-thumb{height:140px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy),var(--dark));color:var(--white);font-size:0.85rem;font-weight:600;}
.gallery-item-info{padding:0.5rem 0.75rem;}
.gallery-item-info p{font-size:0.78rem;color:var(--navy);font-weight:500;}
.gallery-item-info span{font-size:0.7rem;color:var(--gray);}
.gallery-item-card .btn-delete{position:absolute;top:0.5rem;right:0.5rem;font-size:0.75rem;padding:0.25rem 0.5rem;}

/* LIST TABLE */
.list-table{border-radius:12px;overflow:hidden;border:1px solid rgba(27,42,107,0.08);}
.list-header{display:grid;grid-template-columns:2fr 1.5fr 1fr 1fr 2fr;background:var(--navy);padding:0.75rem 1rem;gap:0.5rem;}
.list-header span{font-size:0.72rem;font-weight:700;color:rgba(255,255,255,0.7);text-transform:uppercase;letter-spacing:0.5px;}
.list-row{display:grid;grid-template-columns:2fr 1.5fr 1fr 1fr 2fr;padding:0.85rem 1rem;gap:0.5rem;border-bottom:1px solid rgba(27,42,107,0.06);align-items:center;}
.list-row:last-child{border-bottom:none;}
.list-row:hover{background:var(--light);}
.list-row span{font-size:0.82rem;color:var(--navy);}
.list-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;vertical-align:middle;}
.list-avatar-placeholder{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--navy),var(--red));display:inline-flex;align-items:center;justify-content:center;font-weight:700;color:var(--white);font-size:0.85rem;}

/* LIST ITEM CARD */
.list-item-card{display:flex;align-items:center;justify-content:space-between;background:var(--light);border-radius:12px;padding:1rem 1.25rem;margin-bottom:0.75rem;gap:1rem;flex-wrap:wrap;}
.list-item-info{display:flex;align-items:center;gap:0.75rem;flex:1;min-width:200px;}
.list-item-info strong{font-size:0.88rem;color:var(--navy);}
.list-item-info p{font-size:0.75rem;color:var(--gray);}

/* DEPT FILTER */
.dept-filter{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem;}
.dept-filter-btn{background:var(--light);border:1.5px solid rgba(27,42,107,0.15);color:var(--navy);padding:0.5rem 1rem;border-radius:50px;font-family:'Poppins',sans-serif;font-size:0.78rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
.dept-filter-btn.active,.dept-filter-btn:hover{background:var(--navy);color:var(--white);border-color:var(--navy);}

/* STATUS */
.status-badge{font-size:0.72rem;font-weight:600;padding:0.2rem 0.6rem;border-radius:50px;}
.status-badge.upcoming,.cert-status.pending{background:rgba(245,166,35,0.15);color:#b37800;}
.status-badge.past,.cert-status.approved{background:rgba(39,174,96,0.15);color:var(--green);}
.cert-status.rejected{background:rgba(230,51,41,0.1);color:var(--red);}
.status-select{background:var(--light);border:1px solid rgba(27,42,107,0.15);color:var(--navy);padding:0.35rem 0.5rem;border-radius:8px;font-family:'Poppins',sans-serif;font-size:0.78rem;outline:none;}

/* LOADING */
.loading{text-align:center;padding:3rem;color:var(--gray);}

/* RESPONSIVE */
@media(max-width:1024px){
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .overview-grid{grid-template-columns:1fr;}
  .gallery-grid{grid-template-columns:repeat(3,1fr);}
  .list-header,.list-row{grid-template-columns:2fr 1.5fr 1fr 2fr;}
  .list-header span:nth-child(3),.list-row span:nth-child(3){display:none;}
}
@media(max-width:768px){
  :root{--sidebar:0px;}
  .admin-sidebar{transform:translateX(-100%);transition:transform 0.3s;width:240px;}
  .admin-sidebar.open{transform:translateX(0);}
  .admin-main{margin-left:0;}
  .form-grid{grid-template-columns:1fr;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .gallery-grid{grid-template-columns:repeat(2,1fr);}
  #content-area{padding:1.25rem;}
  .list-header,.list-row{grid-template-columns:2fr 1fr 2fr;font-size:0.75rem;}
  .list-header span:nth-child(2),.list-header span:nth-child(3),.list-row span:nth-child(2),.list-row span:nth-child(3){display:none;}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr;}
  .gallery-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- LOGIN -->

  <div class="login-card">
    <img src="images/logo.jpeg" alt="YAN Logo">
    <h2>Admin Dashboard</h2>
    <p>Young Africans Network — Content Management System</p>
    <input type="password" id="admin-pass" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doAdminLogin()">
    <button class="btn-login" onclick="doAdminLogin()">Access Dashboard </button>
    <a href="index.html" class="login-back">← Back to website</a>
  </div>
</div>

<!-- DASHBOARD -->
<div id="screen-dashboard">

  <!-- SIDEBAR -->
  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="admin-sidebar-logo">
      <img src="images/logo.jpeg" alt="YAN">
      <div>Young Africans Network <span>Admin CMS</span></div>
    </div>
    <nav class="admin-nav">
      <!-- Dashboard -->
      <button class="nav-item" data-section="overview" onclick="loadSection('overview')"><span class="nav-icon">📊</span> Overview</button>
      <button class="nav-item" data-section="analytics" onclick="loadSection('analytics')"><span class="nav-icon">📈</span> Analytics</button>
      <button class="nav-item" data-section="errors" onclick="loadSection('errors')"><span class="nav-icon">🚨</span> System Errors</button>
      <button class="nav-item" data-section="lab" onclick="loadSection('lab')"><span class="nav-icon">🧪</span> Entrepreneurs Lab</button>
      <button class="nav-item" data-section="finance" onclick="loadSection('finance')"><span class="nav-icon">💰</span> Finance</button>

      <!-- Community -->
      <div class="nav-group">
        <button class="nav-group-header" onclick="toggleNavGroup('community')">
          <span>👥 Community</span><span class="nav-arrow" id="arrow-community">▶</span>
        </button>
        <div class="nav-group-items" id="group-community" style="display:none;">
          <button class="nav-item nav-sub" data-section="members" onclick="loadSection('members')"><span class="nav-icon">👤</span> Members</button>
          <button class="nav-item nav-sub" data-section="moderation" onclick="loadSection('moderation')"><span class="nav-icon">🛡️</span> Moderation</button>
          <button class="nav-item nav-sub" data-section="forms" onclick="loadSection('forms')"><span class="nav-icon">📋</span> Form Submissions</button>
          <button class="nav-item nav-sub" data-section="notifications" onclick="loadSection('notifications')"><span class="nav-icon">🔔</span> Notifications</button>
        </div>
      </div>

      <!-- Programs & Learning -->
      <div class="nav-group">
        <button class="nav-group-header" onclick="toggleNavGroup('programs')">
          <span>🎓 Programs & Learning</span><span class="nav-arrow" id="arrow-programs">▶</span>
        </button>
        <div class="nav-group-items" id="group-programs" style="display:none;">
          <button class="nav-item nav-sub" data-section="programs" onclick="loadSection('programs')"><span class="nav-icon">📚</span> Programs Manager</button>
          <button class="nav-item nav-sub" data-section="applications" onclick="loadSection('applications')"><span class="nav-icon">📝</span> Program Applications</button>
          <button class="nav-item nav-sub" data-section="mentors" onclick="loadSection('mentors')"><span class="nav-icon">🎓</span> Mentor Applications</button>
          <button class="nav-item nav-sub" data-section="assignments" onclick="loadSection('assignments')"><span class="nav-icon">✏️</span> Assignments</button>
          <button class="nav-item nav-sub" data-section="certificates" onclick="loadSection('certificates')"><span class="nav-icon">🏆</span> Certificates</button>
          <button class="nav-item nav-sub" data-section="materials" onclick="loadSection('materials')"><span class="nav-icon">📖</span> Training Materials</button>
        </div>
      </div>

      <!-- Content -->
      <div class="nav-group">
        <button class="nav-group-header" onclick="toggleNavGroup('content')">
          <span>🌍 Content</span><span class="nav-arrow" id="arrow-content">▶</span>
        </button>
        <div class="nav-group-items" id="group-content" style="display:none;">
          <button class="nav-item nav-sub" data-section="gallery" onclick="loadSection('gallery')"><span class="nav-icon">🖼️</span> Gallery</button>
          <button class="nav-item nav-sub" data-section="events" onclick="loadSection('events')"><span class="nav-icon">📅</span> Events</button>
          <button class="nav-item nav-sub" data-section="stories" onclick="loadSection('stories')"><span class="nav-icon">📖</span> Journey Stories</button>
          <button class="nav-item nav-sub" data-section="newsletters" onclick="loadSection('newsletters')"><span class="nav-icon">📧</span> Newsletters</button>
          <button class="nav-item nav-sub" data-section="hubs" onclick="loadSection('hubs')"><span class="nav-icon">🏛️</span> YAN Hubs</button>
          <button class="nav-item nav-sub" data-section="opportunities" onclick="loadSection('opportunities')"><span class="nav-icon">🌍</span> Opportunities Manager</button>
        </div>
      </div>

      <!-- Partnerships -->
      <div class="nav-group">
        <button class="nav-group-header" onclick="toggleNavGroup('partnerships')">
          <span>🤝 Partnerships</span><span class="nav-arrow" id="arrow-partnerships">▶</span>
        </button>
        <div class="nav-group-items" id="group-partnerships" style="display:none;">
          <button class="nav-item nav-sub" data-section="partnerships" onclick="loadSection('partnerships')"><span class="nav-icon">🌐</span> Partnerships</button>
          <button class="nav-item nav-sub" data-section="recommendations" onclick="loadSection('recommendations')"><span class="nav-icon">⭐</span> Recommendations</button>
          <button class="nav-item nav-sub" data-section="team" onclick="loadSection('team')"><span class="nav-icon">👨‍💼</span> Team</button>
        </div>
      </div>
    </nav>
    <div class="admin-sidebar-footer">
      <button class="btn-logout-admin" onclick="doAdminLogout()"> Sign Out</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="admin-main">
    <div class="admin-topbar">
      <div class="admin-topbar-left">
        <button style="background:none;border:none;cursor:pointer;padding:4px;display:flex;flex-direction:column;gap:4px;" onclick="document.getElementById('admin-sidebar').classList.toggle('open')">
          <span style="display:block;width:22px;height:2px;background:var(--navy);border-radius:2px;"></span>
          <span style="display:block;width:22px;height:2px;background:var(--navy);border-radius:2px;"></span>
          <span style="display:block;width:22px;height:2px;background:var(--navy);border-radius:2px;"></span>
        </button>
        <h1>YAN Admin</h1>
        <span id="section-title"> Dashboard Overview</span>
      </div>
      <div class="admin-topbar-right">
        <a href="index.html">← Main Site</a>
      </div>
    </div>
    <div id="content-area">
      <div class="loading">Loading dashboard...</div>
    </div>
  </main>
</div>



<script>
document.addEventListener('click', function(e) {
  const sidebar = document.getElementById('admin-sidebar');
  if (sidebar && !sidebar.contains(e.target) && !e.target.closest('button[onclick*="classList.toggle"]')) {
    sidebar.classList.remove('open');
  }
});





</script>
<!-- emailjs replaced with resend worker -->
<script>// emailjs replaced
function toggleNavGroup(group) {
  const items = document.getElementById('group-' + group);
  const arrow = document.getElementById('arrow-' + group);
  if (!items) return;
  const isOpen = items.style.display !== 'none';
  items.style.display = isOpen ? 'none' : 'block';
  if (arrow) arrow.classList.toggle('open', !isOpen);
}



window.filterApps = function(status) {
  document.querySelectorAll('.app-card').forEach(card => {
    card.style.display = (status === 'all' || card.dataset.status === status) ? 'block' : 'none';
  });
};

</script>
