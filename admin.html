function checkAuth() {
  const auth = sessionStorage.getItem('yan_admin');
  if (auth !== 'true') {
    document.getElementById('screen-login').style.display = 'flex';
    document.getElementById('screen-dashboard').style.display = 'none';
  } else {
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-dashboard').style.display = 'flex';
    loadSection('overview');
  }
}

window.doAdminLogin = function() {
  const pass = document.getElementById('admin-pass').value;
  if (pass === ADMIN_PASSWORD) {
    sessionStorage.setItem('yan_admin', 'true');

};

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}
function timeAgo(ts) {
  if (!ts) return '';
  const t = ts.toMillis ? ts.toMillis() : (ts.seconds ? ts.seconds*1000 : ts);
  const diff = Math.floor((Date.now() - t) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}
function sanitize(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

async function uploadToCloudinary(file) {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLOUDINARY_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, { method: 'POST', body: fd });
  const data = await res.json();
  return data.secure_url || '';
}

async function postToHubAdmin(hubId, colName) {
  const title = document.getElementById('hub-mat-title').value.trim();
  const type = document.getElementById('hub-mat-type').value;
  const url = document.getElementById('hub-mat-url').value.trim();
  const category = document.getElementById('hub-mat-category').value.trim();
  const desc = document.getElementById('hub-mat-desc').value.trim();
  if (!title) return showToast('Enter a title', 'error');
  await addDoc(collection(db, colName), {
    title, type, sourceUrl: url, url, category,
    description: desc, postedBy: 'Admin', postedByName: 'Admin',
    createdAt: serverTimestamp(), active: true
  });
  showToast('Posted to hub!');
  loadHubDetail(hubId);
}

async function deleteHubMaterial(colName, docId, hubId) {
  if (!confirm('Delete this material?')) return;
  await deleteDoc(doc(db, colName, docId));
  showToast('Deleted!');
  loadHubDetail(hubId);
}

async function approveRecLetter(recId, memberName, scholarship) {
  await updateDoc(doc(db,'recommendations',recId), {status:'approved', approvedAt: serverTimestamp()});
  showToast('Approved for '+memberName);
  loadHubDetail('scholarships');
}

async function rejectRecLetter(recId) {
  await updateDoc(doc(db,'recommendations',recId), {status:'rejected'});
  showToast('Rejected');
  loadHubDetail('scholarships');
}

async function bulkApproveJoin() {
  const checked = document.querySelectorAll('.join-checkbox:checked');
  if (checked.length === 0) return showToast('Select at least one request', 'error');
  if (!confirm('Approve ' + checked.length + ' selected requests?')) return;
  for (const cb of checked) {
    await approveJoinRequest(cb.dataset.id, cb.dataset.email, cb.dataset.name);
  }
  showToast(checked.length + ' requests approved!');
  loadSection('forms');
}

async function bulkRejectJoin() {
  const checked = document.querySelectorAll('.join-checkbox:checked');
  if (checked.length === 0) return showToast('Select at least one request', 'error');
  if (!confirm('Reject ' + checked.length + ' selected requests?')) return;
  for (const cb of checked) {
    await rejectJoinRequest(cb.dataset.id, cb.dataset.email, cb.dataset.name);
  }
  showToast(checked.length + ' requests rejected');
  loadSection('forms');
}

window.addGalleryItem = async function() {
  const type = document.getElementById('gal-type').value;
  const caption = document.getElementById('gal-caption').value.trim();
  const category = document.getElementById('gal-category').value;
  let url = '';
  if (type === 'photo') {
    const file = document.getElementById('gal-photo').files[0];
    if (!file) return showToast('Select a photo', 'error');
    showToast('Uploading...');
    url = await uploadToCloudinary(file);
  } else {
    url = document.getElementById('gal-video-url').value.trim();
    if (!url) return showToast('Enter YouTube URL', 'error');
  }
  await addDoc(collection(db, 'gallery'), { type, url, caption, category, createdAt: serverTimestamp() });
  showToast('Gallery item added ✅');
  loadGalleryItems();
};

window.loadGalleryItems = async function loadGalleryItems() {
  const container = document.getElementById('gallery-list');
  if (!container) return;
  const snap = await getDocs(query(collection(db, 'gallery'), orderBy('createdAt', 'desc')));
  if (snap.empty) { container.innerHTML = '<p style="color:var(--gray);">No gallery items yet.</p>'; return; }
  container.innerHTML = snap.docs.map(d => {
    const g = d.data();
    const preview = g.type === 'photo'
      ? `<img src="${sanitize(g.url)}" alt="${sanitize(g.caption)}">`
      : `<div class="video-thumb">🎬 ${sanitize(g.caption||'Video')}</div>`;
    return `
    <div class="gallery-item-card">
      ${preview}
      <div class="gallery-item-info">
        <p>${sanitize(g.caption||'')}</p>
        <span>${sanitize(g.category||'')} · ${sanitize(g.type)}</span>
      </div>
      <button class="btn-delete" onclick="deleteItem('gallery','${d.id}',window.loadGalleryItems)"">🗑️</button>
    </div>`;
  }).join('');
}

  document.querySelectorAll('.dept-filter-btn').forEach(b => b.classList.remove('active'));

async function loadCertificates(c) {
  const snap = await getDocs(query(collection(db, 'certificates'), orderBy('requestedAt', 'desc')));
  const pending = snap.docs.filter(d => d.data().status === 'pending').length;

  let html = '<div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;">'
    + '<h2 style="font-size:1.2rem;font-weight:900;color:var(--navy);">🏆 Certificate Requests</h2>'
    + '<span style="background:var(--red);color:#fff;padding:0.2rem 0.75rem;border-radius:50px;font-size:0.8rem;font-weight:700;">' + pending + ' Pending</span>'
    + '</div>';

  html += '<div style="display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap;">'
    + '<button class="btn-sm btn-navy" onclick="filterCerts("all")">All ('+snap.size+')</button>'
    + '<button class="btn-sm btn-outline" onclick="filterCerts("pending")">⏳ Pending ('+pending+')</button>'
    + '<button class="btn-sm btn-outline" onclick="filterCerts("approved")">✅ Approved</button>'
    + '<button class="btn-sm btn-outline" onclick="filterCerts("rejected")">❌ Rejected</button>'
    + '</div>';

  if (snap.empty) {
    html += '<div class="section-card"><p style="color:var(--gray);text-align:center;padding:2rem;">No certificate requests yet.</p></div>';
  } else {
    snap.docs.forEach(d => {
      const cert = d.data();
      const dept = DEPARTMENTS.find(x => x.id === cert.department);
      const date = cert.requestedAt?.toDate ? cert.requestedAt.toDate().toLocaleDateString() : 'Unknown';
      const statusColor = cert.status === 'approved' ? '#27AE60' : cert.status === 'rejected' ? 'var(--red)' : 'var(--gold)';
      const statusLabel = cert.status === 'approved' ? '✅ Approved' : cert.status === 'rejected' ? '❌ Rejected' : '⏳ Pending';

      html += '<div class="section-card cert-card" data-status="'+(cert.status||'pending')+'" style="margin-bottom:1rem;">'
        + '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:0.75rem;margin-bottom:1rem;">'
        + '<div style="display:flex;align-items:center;gap:0.75rem;">'
        + '<div style="width:48px;height:48px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:1.4rem;">'+(dept?.icon||'🏆')+'</div>'
        + '<div>'
        + '<p style="font-size:1rem;font-weight:800;color:var(--navy);">'+(cert.userName||'Unknown')+'</p>'
        + '<p style="font-size:0.78rem;color:var(--gray);">📅 Requested: '+date+'</p>'
        + '</div></div>'
        + '<span style="background:'+statusColor+'22;color:'+statusColor+';padding:0.3rem 0.9rem;border-radius:50px;font-size:0.78rem;font-weight:700;">'+statusLabel+'</span>'
        + '</div>'
        + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">'
        + '<div style="background:var(--light);border-radius:12px;padding:1rem;">'
        + '<p style="font-size:0.75rem;font-weight:700;color:var(--gray);margin-bottom:0.25rem;">DEPARTMENT</p>'
        + '<p style="font-size:0.88rem;font-weight:700;color:var(--navy);">'+(dept?.icon||'')+' '+(dept?.name||cert.department||'Unknown')+'</p>'
        + '</div>'
        + '<div style="background:var(--light);border-radius:12px;padding:1rem;">'
        + '<p style="font-size:0.75rem;font-weight:700;color:var(--gray);margin-bottom:0.25rem;">PROGRAM</p>'
        + '<p style="font-size:0.88rem;font-weight:700;color:var(--navy);">'+(cert.programTitle||cert.program||'Not specified')+'</p>'
        + '</div>'
        + '<div style="background:var(--light);border-radius:12px;padding:1rem;">'
        + '<p style="font-size:0.75rem;font-weight:700;color:var(--gray);margin-bottom:0.25rem;">MODULES COMPLETED</p>'
        + '<p style="font-size:0.88rem;font-weight:700;color:var(--navy);">'+(cert.modulesCompleted||cert.modules||'N/A')+'</p>'
        + '</div>'
        + '<div style="background:var(--light);border-radius:12px;padding:1rem;">'
        + '<p style="font-size:0.75rem;font-weight:700;color:var(--gray);margin-bottom:0.25rem;">SCORE / GRADE</p>'
        + '<p style="font-size:0.88rem;font-weight:700;color:var(--navy);">'+(cert.score||cert.grade||'N/A')+'</p>'
        + '</div>'
        + '</div>'
        + (cert.approvedBy ? '<p style="font-size:0.75rem;color:#27AE60;margin-bottom:1rem;">✅ Approved by: '+sanitize(cert.approvedBy)+'</p>' : '')
        + (cert.status === 'pending' ?
          '<div style="display:flex;gap:0.75rem;flex-wrap:wrap;">'
          + '<button class="btn-primary" style="width:auto;padding:0.6rem 1.5rem;" onclick="adminApproveCert(&quot;'+d.id+'&quot;)">✅ Approve Certificate</button>'
          + '<button class="btn-sm btn-red" style="padding:0.6rem 1.5rem;" onclick="adminRejectCert(&quot;'+d.id+'&quot;)">❌ Reject</button>'
          + '</div>'
          : '<p style="font-size:0.78rem;font-weight:600;color:'+statusColor+';">'+statusLabel+'</p>')
        + '</div>';
    });
  }

  c.innerHTML = html;
}

window.viewMemberProgress = async function(userId, userName) {
  const container = document.getElementById('content-area');
  container.innerHTML = '<div class="loading">Loading progress for ' + userName + '...</div>';

  try {
    // Get tech hub progress
    const techProgress = await getDocs(query(collection(db, 'learningProgress'), where('userId', '==', userId)));
    const careerProgress = await getDocs(query(collection(db, 'careerLearningProgress'), where('userId', '==', userId)));
    const assignments = await getDocs(query(collection(db, 'programAssignments'), where('userId', '==', userId)));
    const careerAssignments = await getDocs(query(collection(db, 'careerAssignments'), where('userId', '==', userId)));

    let html = '<div class="section-card">';

        html += '</div>';
        html += '<p style="font-size:0.72rem;color:var(--gray);margin-top:0.35rem;">' + pct + '% complete' + (pct===100?' ✅ Completed!':'') + '</p>';

    if (careerProgress.empty) {
      html += '<p style="color:var(--gray);font-size:0.85rem;margin-bottom:1rem;">No career programs enrolled yet.</p>';
    } else {
      careerProgress.docs.forEach(d => {
        const p = d.data();
        const progId = d.id.replace(userId + '_', '');
        const completed = (p.lessonsCompleted || []).length;
        const total = p.totalLessons || 20;
        const pct = Math.round((completed / total) * 100);
        html += '<div style="background:var(--light);border-radius:12px;padding:1rem;margin-bottom:0.75rem;">';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">';
        html += '<p style="font-size:0.85rem;font-weight:700;color:var(--navy);">' + progId + '</p>';
        html += '<span style="font-size:0.78rem;color:var(--gray);">' + completed + '/' + total + ' lessons</span>';
        html += '</div>';
        html += '<div style="background:#e0e0e0;border-radius:50px;height:8px;width:100%;">';
        html += '<div style="background:' + (pct===100?'#27AE60':'#F5A623') + ';border-radius:50px;height:8px;width:' + pct + '%;transition:width 0.3s;"></div>';
        html += '</div>';
        html += '<p style="font-size:0.72rem;color:var(--gray);margin-top:0.35rem;">' + pct + '% complete' + (pct===100?' ✅ Completed!':'') + '</p>';
        html += '</div>';
      });
    }

    // Assignments
    const allAssignments = [...assignments.docs, ...careerAssignments.docs];
    html += '<h4 style="font-size:0.9rem;font-weight:700;color:var(--navy);margin:1rem 0 0.75rem;padding-bottom:0.5rem;border-bottom:2px solid var(--light);">📝 Assignments (' + allAssignments.length + ')</h4>';
    if (allAssignments.length === 0) {
      html += '<p style="color:var(--gray);font-size:0.85rem;">No assignments submitted yet.</p>';
    } else {
      allAssignments.forEach(d => {
        const a = d.data();
        const statusColor = a.status === 'approved' ? '#27AE60' : a.status === 'rejected' ? '#E63329' : '#F5A623';
        html += '<div style="background:var(--light);border-radius:12px;padding:1rem;margin-bottom:0.75rem;">';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;">';
        html += '<p style="font-size:0.85rem;font-weight:700;color:var(--navy);">' + sanitize(a.programId || 'Program') + '</p>';
        html += '<span style="background:' + statusColor + '18;color:' + statusColor + ';padding:0.2rem 0.6rem;border-radius:50px;font-size:0.72rem;font-weight:700;">' + (a.status || 'pending').toUpperCase() + '</span>';
        html += '</div>';
        html += '<p style="font-size:0.78rem;color:var(--gray);margin-top:0.35rem;">' + sanitize(a.answer || a.submission || '') + '</p>';
        if (a.feedback) html += '<p style="font-size:0.78rem;color:#27AE60;margin-top:0.25rem;">Feedback: ' + sanitize(a.feedback) + '</p>';
        html += '</div>';
      });
    }

    html += '</div>';
    container.innerHTML = html;
  } catch(e) {
    container.innerHTML = '<p style="color:red;">Error: ' + e.message + '</p>';
  }
};

// ===== ASSIGNMENTS REVIEW =====
async function loadAssignments(c) {
  c.innerHTML = '<div class="loading">Loading assignments...</div>';
  try {
    const [techAssign, careerAssign, quizFails] = await Promise.all([
      getDocs(query(collection(db, 'programAssignments'), orderBy('submittedAt', 'desc'))),
      getDocs(query(collection(db, 'careerAssignments'), orderBy('submittedAt', 'desc'))),
      getDocs(query(collection(db, 'quizFailures'), orderBy('createdAt', 'desc')))
    ]);

    const all = [
      ...techAssign.docs.map(d => ({...d.data(), id: d.id, type: 'Tech'})),
      ...careerAssign.docs.map(d => ({...d.data(), id: d.id, type: 'Career'}))
    ].sort((a,b) => (b.submittedAt?.seconds||0) - (a.submittedAt?.seconds||0));

    const pending = all.filter(a => !a.status || a.status === 'pending');
    const reviewed = all.filter(a => a.status && a.status !== 'pending');

    let html = '<div class="section-card">';
    html += '<h3 style="font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:1rem;">📝 Pending Assignments (' + pending.length + ')</h3>';

    if (pending.length === 0) {
      html += '<p style="color:var(--gray);font-size:0.85rem;">No pending assignments.</p>';
    } else {
      pending.forEach(a => {
        const col = a.type === 'Tech' ? 'programAssignments' : 'careerAssignments';
        html += '<div style="background:var(--light);border-radius:12px;padding:1rem;margin-bottom:1rem;">';
        html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.5rem;">';
        html += '<div><p style="font-size:0.85rem;font-weight:700;color:var(--navy);">' + sanitize(a.userName || a.userId || 'Member') + '</p>';
        html += '<p style="font-size:0.72rem;color:var(--gray);">' + a.type + ' Hub · ' + sanitize(a.programId || '') + ' · Module ' + (a.moduleWeek || '') + '</p></div>';
        html += '<span style="background:rgba(245,166,35,0.1);color:#F5A623;padding:0.2rem 0.6rem;border-radius:50px;font-size:0.72rem;font-weight:700;">PENDING</span>';
        html += '</div>';
        html += '<p style="font-size:0.82rem;color:var(--navy);background:white;padding:0.75rem;border-radius:8px;margin-bottom:0.75rem;">' + sanitize(a.answer || a.submission || 'No content') + '</p>';
        html += '<textarea id="feedback-' + a.id + '" placeholder="Write feedback..." style="width:100%;padding:0.5rem;border:1.5px solid rgba(27,42,107,0.15);border-radius:8px;font-family:Poppins,sans-serif;font-size:0.82rem;margin-bottom:0.5rem;resize:vertical;min-height:60px;"></textarea>';
        html += '<div style="display:flex;gap:0.5rem;">';
        html += '<button class="btn-sm btn-navy" onclick="reviewAssignment(\''+col+'\',\''+a.id+'\',\'approved\')">✅ Approve</button>';
        html += '<button class="btn-sm btn-red" onclick="reviewAssignment(\''+col+'\',\''+a.id+'\',\'rejected\')">❌ Reject</button>';
        html += '</div></div>';
      });
    }
    html += '</div>';

    if (reviewed.length > 0) {
      html += '<div class="section-card"><h3 style="font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:1rem;">✅ Reviewed Assignments (' + reviewed.length + ')</h3>';
      reviewed.forEach(a => {
        const statusColor = a.status === 'approved' ? '#27AE60' : '#E63329';
        html += '<div style="background:var(--light);border-radius:12px;padding:0.75rem;margin-bottom:0.75rem;display:flex;justify-content:space-between;align-items:center;">';
        html += '<div><p style="font-size:0.85rem;font-weight:700;color:var(--navy);">' + sanitize(a.userName || a.userId || 'Member') + '</p>';
        html += '<p style="font-size:0.72rem;color:var(--gray);">' + a.type + ' · ' + sanitize(a.programId || '') + '</p></div>';
        html += '<span style="background:' + statusColor + '18;color:' + statusColor + ';padding:0.2rem 0.6rem;border-radius:50px;font-size:0.72rem;font-weight:700;">' + a.status.toUpperCase() + '</span>';
        html += '</div>';
      });
      html += '</div>';
    }

    // Quiz Failures Section
    html += '<div class="section-card"><h3 style="font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:1rem;">😓 Quiz Failures & Feedback (' + quizFails.size + ')</h3>';
    if (quizFails.empty) {
      html += '<p style="color:var(--gray);font-size:0.85rem;">No quiz failures yet.</p>';
    } else {
      quizFails.docs.forEach(function(d) {
        const q = d.data();
        const statusColor = q.reviewed ? '#27AE60' : '#F5A623';
        html += '<div style="background:var(--light);border-radius:12px;padding:1rem;margin-bottom:0.75rem;">';
        html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.5rem;">';
        html += '<div><p style="font-size:0.85rem;font-weight:700;color:var(--navy);">' + sanitize(q.userName || q.userId || 'Member') + '</p>';
        html += '<p style="font-size:0.72rem;color:var(--gray);">Program: ' + sanitize(q.programId || '') + ' · Module ' + (q.moduleWeek || '') + ' · Score: ' + (q.score || 0) + '%</p></div>';
        html += '<span style="background:' + statusColor + '18;color:' + statusColor + ';padding:0.2rem 0.6rem;border-radius:50px;font-size:0.72rem;font-weight:700;">' + (q.reviewed ? 'REVIEWED' : 'PENDING') + '</span>';
        html += '</div>';
        html += '<p style="font-size:0.82rem;color:var(--navy);background:white;padding:0.75rem;border-radius:8px;margin-bottom:0.75rem;"><strong>Difficulty feedback:</strong> ' + sanitize(q.difficulty || q.feedback || 'No feedback') + '</p>';
        html += '<div style="display:flex;gap:0.5rem;">';
        html += '<button class="btn-sm btn-navy" onclick="resetQuizAttempts(\''+d.id+'\',\''+( q.userId||'')+'\'\',\'\''+(q.programId||'')+'\',\'\''+(q.moduleWeek||'')+'\')">🔄 Reset Attempts</button>';
        html += '<button class="btn-sm" style="background:var(--light);border:1px solid rgba(27,42,107,0.15);color:var(--navy);" onclick="markQuizReviewed(\'' + d.id + '\')">✅ Mark Reviewed</button>';
        html += '</div></div>';
      });
    }
    html += '</div>';

    c.innerHTML = html;
  } catch(e) {
    c.innerHTML = '<p style="color:red;">Error: ' + e.message + '</p>';
  }
}

window.resetQuizAttempts = async function(failureId, userId, programId, moduleWeek) {
  if (!confirm('Reset quiz attempts for this member?')) return;
  try {
    const attemptId = userId + '_' + programId + '_' + moduleWeek;
    await deleteDoc(doc(db, 'quizAttempts', attemptId));
    await updateDoc(doc(db, 'quizFailures', failureId), { reviewed: true, resetAt: serverTimestamp(), resetBy: 'Admin' });
    await addDoc(collection(db, 'notifications'), {
      title: '🔄 Quiz Attempts Reset',
      message: 'Your quiz attempts for Module ' + moduleWeek + ' in ' + programId + ' have been reset by the admin. You can now retake the quiz.',
      type: 'info',
      userId: userId,
      postedBy: 'YAN Admin',
      createdAt: serverTimestamp(),
      readBy: []
    });
    showToast('✅ Quiz attempts reset! Member has been notified.');
    loadSection('assignments');
  } catch(e) {
    showToast(e.message, 'error');
  }
};

window.markQuizReviewed = async function(failureId) {
  try {
    await updateDoc(doc(db, 'quizFailures', failureId), { reviewed: true, reviewedAt: serverTimestamp() });
    showToast('✅ Marked as reviewed');
    loadSection('assignments');
  } catch(e) {
    showToast(e.message, 'error');
  }
};

window.reviewAssignment = async function(colName, assignId, status) {
  const feedback = document.getElementById('feedback-' + assignId)?.value || '';
  try {
    const assignSnap = await getDoc(doc(db, colName, assignId));
    const assignData = assignSnap.data();
    await updateDoc(doc(db, colName, assignId), {
      status: status,
      feedback: feedback,
      reviewedAt: serverTimestamp(),
      reviewedBy: 'Admin'
    });
    if (assignData?.userId) {
      await addDoc(collection(db, 'notifications'), {
        title: status === 'approved' ? '✅ Assignment Approved!' : '📝 Assignment Feedback',
        message: status === 'approved'
          ? 'Your assignment for ' + (assignData.programId || 'your program') + ' has been approved! ' + (feedback ? 'Feedback: ' + feedback : 'Great work!')
          : 'Your assignment for ' + (assignData.programId || 'your program') + ' needs revision. Feedback: ' + (feedback || 'Please review and resubmit.'),
        type: status === 'approved' ? 'success' : 'info',
        userId: assignData.userId,
        postedBy: 'YAN Admin',
        createdAt: serverTimestamp(),
        readBy: []
      });
    }
    showToast(status === 'approved' ? '✅ Assignment approved! Member notified.' : '❌ Assignment rejected! Member notified.');
    loadSection('assignments');
  } catch(e) {
    showToast(e.message, 'error');
  }
};

      html += '<div><p style="font-size:0.85rem;font-weight:700;color:var(--navy);">' + sanitize(p.title || d.id) + '</p>';
      html += '<p style="font-size:0.72rem;color:var(--gray);">' + sanitize(p.category || '') + ' · ' + (p.enrolledBy?.length || 0) + ' enrolled</p></div>';
      html += '<div style="display:flex;align-items:center;gap:0.5rem;">';
      html += '<span style="background:' + (isOpen?'rgba(39,174,96,0.1)':'rgba(107,114,128,0.1)') + ';color:' + (isOpen?'#27AE60':'var(--gray)') + ';padding:0.2rem 0.6rem;border-radius:50px;font-size:0.72rem;font-weight:700;">' + (isOpen?'🟢 Open':'🔒 Closed') + '</span>';
      html += '<button class="btn-sm ' + (isOpen?'btn-red':'btn-navy') + '" onclick="toggleProgram(\'careerPrograms\',' + "'" + d.id + "'" + ',' + !isOpen + ')">' + (isOpen?'Close':'Open') + '</button>';
      html += '<button class="btn-sm" style="background:#0A66C2;color:#fff;" onclick="editProgram(\'careerPrograms\',' + "'" + d.id + "'" + ')">' + 'Edit' + '</button>';
      html += '<button class="btn-sm btn-red" onclick="deleteProgram(\'careerPrograms\',' + "'" + d.id + "'" + ')">' + 'Delete' + '</button>';
      html += '</div></div>';
    });
    html += '</div>';
    c.innerHTML = html;
  } catch(e) {
    c.innerHTML = '<p style="color:red;">Error: ' + e.message + '</p>';
  }
}

window.fillNotifTemplate = function(btn) {
  document.getElementById('notif-title-admin').value = btn.dataset.title || '';
  document.getElementById('notif-message-admin').value = btn.dataset.msg || '';
};

window.sendAdminNotification = async function() {
  const title = document.getElementById('notif-title-admin').value.trim();
  const message = document.getElementById('notif-message-admin').value.trim();
  const type = document.getElementById('notif-type-admin').value;
  const audience = document.getElementById('notif-audience').value;

  if (!title || !message) return showToast('Enter title and message', 'error');

  try {
    const notifData = {
      title, message, type,
      audience: audience,
      postedBy: 'YAN Admin',
      createdAt: serverTimestamp(),
      readBy: []
    };

    if (audience !== 'all') notifData.department = audience;

    await addDoc(collection(db, 'notifications'), notifData);
    showToast('🔔 Notification sent successfully!');
    document.getElementById('notif-title-admin').value = '';
    document.getElementById('notif-message-admin').value = '';
    loadSection('notifications');
  } catch(e) {
    showToast(e.message, 'error');
  }
};

window.deleteNotification = async function(notifId) {
  if (!confirm('Delete this notification?')) return;
  await deleteDoc(doc(db, 'notifications', notifId));
  showToast('Notification deleted');
  loadSection('notifications');
};


// ===== FINANCE MANAGER =====
async function loadFinance(c) {
  c.innerHTML = '<div class="loading">Loading finance data...</div>';
  try {
    const [incomeSnap, expenseSnap, loanSnap] = await Promise.all([
      getDocs(query(collection(db, 'financeIncome'), orderBy('date', 'desc'))),
      getDocs(query(collection(db, 'financeExpenses'), orderBy('date', 'desc'))),
      getDocs(query(collection(db, 'financeLoans'), orderBy('date', 'desc')))
    ]);
    const income = incomeSnap.docs.map(d => ({...d.data(), id: d.id}));
    const expenses = expenseSnap.docs.map(d => ({...d.data(), id: d.id}));
    const loans = loanSnap.docs.map(d => ({...d.data(), id: d.id}));
    const totalIncome = income.reduce((s,i) => s + (parseFloat(i.amount)||0), 0);
    const totalExpenses = expenses.reduce((s,e) => s + (parseFloat(e.amount)||0), 0);
    const outstandingLoans = loans.filter(l => l.status !== 'repaid').reduce((s,l) => s + (parseFloat(l.amount)||0), 0);
    const balance = totalIncome - totalExpenses;
    let html = '';
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem;">';
    html += '<div class="stat-card green"><div class="stat-num">KES ' + totalIncome.toLocaleString() + '</div><div class="stat-label">Total Income</div></div>';
    html += '<div class="stat-card red"><div class="stat-num">KES ' + totalExpenses.toLocaleString() + '</div><div class="stat-label">Total Expenses</div></div>';
    html += '<div class="stat-card"><div class="stat-num" style="color:' + (balance>=0?'#27AE60':'#E63329') + '">KES ' + balance.toLocaleString() + '</div><div class="stat-label">Balance</div></div>';
    html += '<div class="stat-card"><div class="stat-num">KES ' + outstandingLoans.toLocaleString() + '</div><div class="stat-label">Outstanding Loans</div></div>';
    html += '</div>';
    html += '<div style="display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:1.5rem;">';
    html += '<button onclick="showFinanceForm(\'income\')" style="background:#27AE60;color:#fff;border:none;padding:0.75rem 1.25rem;border-radius:50px;font-family:Poppins,sans-serif;font-weight:600;font-size:0.85rem;cursor:pointer;">+ Add Income</button>';
    html += '<button onclick="showFinanceForm(\'expense\')" style="background:#E63329;color:#fff;border:none;padding:0.75rem 1.25rem;border-radius:50px;font-family:Poppins,sans-serif;font-weight:600;font-size:0.85rem;cursor:pointer;">+ Add Expense</button>';
    html += '<button onclick="showFinanceForm(\'loan\')" style="background:#F5A623;color:#fff;border:none;padding:0.75rem 1.25rem;border-radius:50px;font-family:Poppins,sans-serif;font-weight:600;font-size:0.85rem;cursor:pointer;">+ Add Loan</button>';
    html += '<button onclick="generateBalanceSheet()" style="background:var(--navy);color:#fff;border:none;padding:0.75rem 1.25rem;border-radius:50px;font-family:Poppins,sans-serif;font-weight:600;font-size:0.85rem;cursor:pointer;">📊 Balance Sheet</button>';
    html += '</div>';
    html += '<div id="finance-form-container"></div>';
    html += '<div class="section-card"><h3 style="font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:1rem;">💰 Income (' + income.length + ')</h3>';
    if (!income.length) { html += '<p style="color:var(--gray);font-size:0.85rem;">No income recorded yet.</p>'; }
    else {
      html += '<table style="width:100%;border-collapse:collapse;font-size:0.82rem;"><tr style="background:var(--light);"><th style="padding:0.5rem;text-align:left;">Date</th><th style="padding:0.5rem;text-align:left;">Description</th><th style="padding:0.5rem;text-align:left;">Category</th><th style="padding:0.5rem;text-align:right;">Amount</th><th></th></tr>';
      income.forEach(function(i) {
        html += '<tr style="border-bottom:1px solid var(--light);"><td style="padding:0.5rem;">' + sanitize(i.date||'') + '</td><td style="padding:0.5rem;">' + sanitize(i.description||'') + '</td><td style="padding:0.5rem;">' + sanitize(i.category||'') + '</td><td style="padding:0.5rem;text-align:right;font-weight:700;color:#27AE60;">' + parseFloat(i.amount||0).toLocaleString() + '</td><td><button onclick="deleteFinanceEntry(\'financeIncome\',\'' + i.id + '\')" style="background:none;border:none;cursor:pointer;">🗑️</button><button onclick="generateReceipt(\'financeIncome\',\'' + i.id + '\')" style="background:none;border:none;cursor:pointer;">🧾</button></td></tr>';
      });
      html += '</table>';
    }
    html += '</div>';
    html += '<div class="section-card"><h3 style="font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:1rem;">💸 Expenses (' + expenses.length + ')</h3>';
    if (!expenses.length) { html += '<p style="color:var(--gray);font-size:0.85rem;">No expenses recorded yet.</p>'; }
    else {
      html += '<table style="width:100%;border-collapse:collapse;font-size:0.82rem;"><tr style="background:var(--light);"><th style="padding:0.5rem;text-align:left;">Date</th><th style="padding:0.5rem;text-align:left;">Description</th><th style="padding:0.5rem;text-align:left;">Category</th><th style="padding:0.5rem;text-align:right;">Amount</th><th>Receipt</th><th></th></tr>';
      expenses.forEach(function(e) {
        html += '<tr style="border-bottom:1px solid var(--light);"><td style="padding:0.5rem;">' + sanitize(e.date||'') + '</td><td style="padding:0.5rem;">' + sanitize(e.description||'') + '</td><td style="padding:0.5rem;">' + sanitize(e.category||'') + '</td><td style="padding:0.5rem;text-align:right;font-weight:700;color:#E63329;">' + parseFloat(e.amount||0).toLocaleString() + '</td><td style="padding:0.5rem;">' + (e.receiptUrl ? '<a href="' + e.receiptUrl + '" target="_blank" style="color:var(--navy);font-size:0.75rem;">View 📎</a>' : '-') + '</td><td><button onclick="deleteFinanceEntry(\'financeExpenses\',\'' + e.id + '\')" style="background:none;border:none;cursor:pointer;">🗑️</button></td></tr>';
      });
      html += '</table>';
    }
    html += '</div>';
    html += '<div class="section-card"><h3 style="font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:1rem;">🏦 Loans (' + loans.length + ')</h3>';
    if (!loans.length) { html += '<p style="color:var(--gray);font-size:0.85rem;">No loans recorded yet.</p>'; }
    else {
      html += '<table style="width:100%;border-collapse:collapse;font-size:0.82rem;"><tr style="background:var(--light);"><th style="padding:0.5rem;">Date</th><th style="padding:0.5rem;">Lender</th><th style="padding:0.5rem;">Purpose</th><th style="padding:0.5rem;">Due</th><th style="padding:0.5rem;text-align:right;">Amount</th><th style="padding:0.5rem;">Status</th><th></th></tr>';
      loans.forEach(function(l) {
        const sc = l.status==='repaid'?'#27AE60':l.status==='overdue'?'#E63329':'#F5A623';
        html += '<tr style="border-bottom:1px solid var(--light);"><td style="padding:0.5rem;">' + sanitize(l.date||'') + '</td><td style="padding:0.5rem;font-weight:600;">' + sanitize(l.lender||'') + '</td><td style="padding:0.5rem;">' + sanitize(l.purpose||l.description||'') + '</td><td style="padding:0.5rem;">' + sanitize(l.dueDate||'') + '</td><td style="padding:0.5rem;text-align:right;font-weight:700;color:#F5A623;">' + parseFloat(l.amount||0).toLocaleString() + '</td><td style="padding:0.5rem;"><span style="background:' + sc + '18;color:' + sc + ';padding:0.2rem 0.5rem;border-radius:50px;font-size:0.72rem;font-weight:700;">' + (l.status||'pending').toUpperCase() + '</span></td><td style="display:flex;gap:0.25rem;"><button onclick="markLoanRepaid(\''+l.id+'\')" style="background:none;border:none;cursor:pointer;font-size:0.72rem;color:#27AE60;">✅</button><button onclick="deleteFinanceEntry(\'financeLoans\',\'' + l.id + '\')" style="background:none;border:none;cursor:pointer;">🗑️</button></td></tr>';
      });
      html += '</table>';
    }
    html += '</div>';
    c.innerHTML = html;
  } catch(e) { c.innerHTML = '<p style="color:red;">Error: ' + e.message + '</p>'; }
}

window.saveFinanceEntry = async function(type) {
  const date = document.getElementById('fin-date').value;
  const amount = document.getElementById('fin-amount').value;
  const category = document.getElementById('fin-category').value;
  const description = document.getElementById('fin-desc').value;
  if (!date||!amount||!description) return showToast('Fill all required fields','error');
  const colName = type==='income'?'financeIncome':type==='loan'?'financeLoans':'financeExpenses';
  const data = {date, amount:parseFloat(amount), category, description, createdBy:'Admin', createdAt:serverTimestamp()};
  if (type==='loan') { data.lender=document.getElementById('fin-lender')?.value||''; data.dueDate=document.getElementById('fin-due')?.value||''; data.status='pending'; data.purpose=description; }
  if (type==='expense') {
    const fi = document.getElementById('fin-receipt');
    if (fi?.files[0]) { try { data.receiptUrl = await uploadToCloudinary(fi.files[0]); } catch(e) {} }
  }
  await addDoc(collection(db,colName), data);
  showToast(type==='income'?'💰 Income recorded!':type==='loan'?'🏦 Loan recorded!':'💸 Expense recorded!');
  loadSection('finance');
};

window.deleteFinanceEntry = async function(colName, id) {
  if (!confirm('Delete this entry?')) return;
  await deleteDoc(doc(db,colName,id));
  showToast('Entry deleted');
  loadSection('finance');
};

window.markLoanRepaid = async function(loanId) {
  if (!confirm('Mark as repaid?')) return;
  await updateDoc(doc(db,'financeLoans',loanId), {status:'repaid',repaidAt:serverTimestamp()});
  showToast('✅ Loan marked as repaid!');
  loadSection('finance');
};

window.generateReceipt = function(colName, id) {
  getDoc(doc(db,colName,id)).then(function(snap) {
    if (!snap.exists()) return;
    const d = snap.data();
    const rNo = 'YAN-' + id.substring(0,8).toUpperCase();
    const w = window.open('','_blank','width=600,height=800');
    w.document.write('<html><head><title>YAN Receipt</title><style>body{font-family:Arial,sans-serif;padding:40px;color:#1B2A6B;}.box{border:2px solid #1B2A6B;border-radius:12px;padding:30px;margin-top:20px;}.row{display:flex;justify-content:space-between;margin-bottom:12px;font-size:14px;}.amt{font-size:28px;font-weight:900;color:#27AE60;margin:20px 0;}@media print{button{display:none;}}</style></head><body>');
    w.document.write('<h2>🌍 Young Africans Network</h2><p style="color:#6B7280;">youngafricansnetwork.org</p>');
    w.document.write('<div class="box"><h3>Official Receipt — '+rNo+'</h3>');
    w.document.write('<div class="row"><span>Date:</span><strong>'+( d.date||''  )+'</strong></div>');
    w.document.write('<div class="row"><span>Description:</span><strong>'+(d.description||'')+'</strong></div>');
    w.document.write('<div class="row"><span>Category:</span><strong>'+(d.category||'')+'</strong></div>');
    w.document.write('<div class="amt">KES '+parseFloat(d.amount||0).toLocaleString()+'</div>');
    w.document.write('<div class="row"><span>Receipt No:</span><strong>'+rNo+'</strong></div>');
    w.document.write('<div class="row"><span>Issued by:</span><strong>YAN Administration</strong></div></div>');
    w.document.write('<br><button onclick="window.print()" style="background:#1B2A6B;color:#fff;padding:10px 30px;border:none;border-radius:50px;cursor:pointer;">🖨️ Print / Save PDF</button>');
    w.document.write('</body></html>'); w.document.close();
  });
};

window.generateBalanceSheet = async function() {
  const [iS,eS,lS] = await Promise.all([getDocs(collection(db,'financeIncome')),getDocs(collection(db,'financeExpenses')),getDocs(collection(db,'financeLoans'))]);
  const inc = iS.docs.map(d=>d.data()), exp = eS.docs.map(d=>d.data()), lns = lS.docs.map(d=>d.data());
  const tI=inc.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
  const tE=exp.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  const tL=lns.filter(l=>l.status!=='repaid').reduce((s,l)=>s+(parseFloat(l.amount)||0),0);
  const net=tI-tE-tL;
  const now=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  const w=window.open('','_blank','width=700,height=900');
  w.document.write('<html><head><title>YAN Balance Sheet</title><style>body{font-family:Arial,sans-serif;padding:40px;color:#1B2A6B;}table{width:100%;border-collapse:collapse;}td,th{padding:8px;border-bottom:1px solid #e0e0e0;}th{background:#f8f9ff;}.tot{font-weight:900;background:#f8f9ff;}.pos{color:#27AE60;font-weight:900;}.neg{color:#E63329;font-weight:900;}@media print{button{display:none;}}</style></head><body>');
  w.document.write('<h1>🌍 Young Africans Network — Balance Sheet</h1><p>As at '+now+'</p>');
  w.document.write('<h3>💰 Income</h3><table><tr><th>Date</th><th>Description</th><th>Category</th><th style="text-align:right;">KES</th></tr>');
  inc.forEach(i=>w.document.write('<tr><td>'+(i.date||'')+'</td><td>'+(i.description||'')+'</td><td>'+(i.category||'')+'</td><td style="text-align:right;">'+parseFloat(i.amount||0).toLocaleString()+'</td></tr>'));
  w.document.write('<tr class="tot"><td colspan="3">TOTAL INCOME</td><td style="text-align:right;" class="pos">KES '+tI.toLocaleString()+'</td></tr></table>');
  w.document.write('<h3>💸 Expenses</h3><table><tr><th>Date</th><th>Description</th><th>Category</th><th style="text-align:right;">KES</th></tr>');
  exp.forEach(e=>w.document.write('<tr><td>'+(e.date||'')+'</td><td>'+(e.description||'')+'</td><td>'+(e.category||'')+'</td><td style="text-align:right;">'+parseFloat(e.amount||0).toLocaleString()+'</td></tr>'));
  w.document.write('<tr class="tot"><td colspan="3">TOTAL EXPENSES</td><td style="text-align:right;" class="neg">KES '+tE.toLocaleString()+'</td></tr></table>');
  w.document.write('<h3>🏦 Outstanding Loans</h3><table><tr><th>Lender</th><th>Purpose</th><th>Due</th><th style="text-align:right;">KES</th></tr>');
  lns.filter(l=>l.status!=='repaid').forEach(l=>w.document.write('<tr><td>'+(l.lender||'')+'</td><td>'+(l.purpose||'')+'</td><td>'+(l.dueDate||'')+'</td><td style="text-align:right;">'+parseFloat(l.amount||0).toLocaleString()+'</td></tr>'));
  w.document.write('<tr class="tot"><td colspan="3">TOTAL OUTSTANDING</td><td style="text-align:right;" class="neg">KES '+tL.toLocaleString()+'</td></tr></table>');
  w.document.write('<h3>📊 Net Position</h3><table><tr><td>Total Income</td><td style="text-align:right;" class="pos">KES '+tI.toLocaleString()+'</td></tr><tr><td>Less: Expenses</td><td style="text-align:right;" class="neg">KES '+tE.toLocaleString()+'</td></tr><tr><td>Less: Outstanding Loans</td><td style="text-align:right;" class="neg">KES '+tL.toLocaleString()+'</td></tr><tr class="tot"><td>NET POSITION</td><td style="text-align:right;" class="'+(net>=0?'pos':'neg')+'">KES '+net.toLocaleString()+'</td></tr></table>');
  w.document.write('<br><button onclick="window.print()" style="background:#1B2A6B;color:#fff;padding:10px 30px;border:none;border-radius:50px;cursor:pointer;">🖨️ Print / Save PDF</button></body></html>');
  w.document.close();
};


window.editProgram = async function(colName, progId) {
  const snap = await getDoc(doc(db, colName, progId));
  if (!snap.exists()) return;
  const p = snap.data();
  const container = document.getElementById('content-area');
  container.innerHTML = '<div class="section-card"><h3 style="font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:1rem;">✏️ Edit Program</h3>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">' +
    '<div class="form-group" style="grid-column:1/-1;"><label>Title *</label><input type="text" id="edit-prog-title" value="' + sanitize(p.title||'') + '" style="width:100%;padding:0.75rem;border:1.5px solid rgba(27,42,107,0.15);border-radius:12px;font-family:Poppins,sans-serif;font-size:0.85rem;"></div>' +
    '<div class="form-group" style="grid-column:1/-1;"><label>Description</label><textarea id="edit-prog-desc" rows="3" style="width:100%;padding:0.75rem;border:1.5px solid rgba(27,42,107,0.15);border-radius:12px;font-family:Poppins,sans-serif;font-size:0.85rem;">' + sanitize(p.description||p.desc||'') + '</textarea></div>' +
    '<div class="form-group"><label>Category</label><input type="text" id="edit-prog-cat" value="' + sanitize(p.category||'') + '" style="width:100%;padding:0.75rem;border:1.5px solid rgba(27,42,107,0.15);border-radius:12px;font-family:Poppins,sans-serif;font-size:0.85rem;"></div>' +
    '<div class="form-group"><label>Duration</label><input type="text" id="edit-prog-dur" value="' + sanitize(p.duration||'4 Weeks') + '" style="width:100%;padding:0.75rem;border:1.5px solid rgba(27,42,107,0.15);border-radius:12px;font-family:Poppins,sans-serif;font-size:0.85rem;"></div>' +
    '<div class="form-group"><label>Level</label><select id="edit-prog-level" style="width:100%;padding:0.75rem;border:1.5px solid rgba(27,42,107,0.15);border-radius:12px;font-family:Poppins,sans-serif;font-size:0.85rem;"><option ' + (p.level==="Beginner"?"selected":"") + '>Beginner</option><option ' + (p.level==="Intermediate"?"selected":"") + '>Intermediate</option><option ' + (p.level==="Advanced"?"selected":"") + '>Advanced</option></select></div>' +
    '<div class="form-group"><label>Modules Count</label><input type="number" id="edit-prog-modules" value="' + (p.modules||4) + '" style="width:100%;padding:0.75rem;border:1.5px solid rgba(27,42,107,0.15);border-radius:12px;font-family:Poppins,sans-serif;font-size:0.85rem;"></div>' +
    '</div>' +
    '<div style="display:flex;gap:0.75rem;margin-top:1rem;">' +
    '<button onclick="saveEditProgram(\''+colName+'\',\''+progId+'\')" style="background:var(--navy);color:#fff;border:none;padding:0.75rem 2rem;border-radius:50px;font-family:Poppins,sans-serif;font-weight:700;cursor:pointer;">Save Changes</button>' +
    '<button onclick="loadSection(\'programs\')" style="background:var(--light);color:var(--navy);border:none;padding:0.75rem 2rem;border-radius:50px;font-family:Poppins,sans-serif;font-weight:600;cursor:pointer;">Cancel</button>' +
    '</div></div>';
};

window.saveEditProgram = async function(colName, progId) {
  const title = document.getElementById('edit-prog-title').value.trim();
  const description = document.getElementById('edit-prog-desc').value.trim();
  const category = document.getElementById('edit-prog-cat').value.trim();
  const duration = document.getElementById('edit-prog-dur').value.trim();
  const level = document.getElementById('edit-prog-level').value;
  const modules = parseInt(document.getElementById('edit-prog-modules').value)||4;
  if (!title) return showToast('Title is required','error');
  try {
    await updateDoc(doc(db,colName,progId),{title,description,category,duration,level,modules,updatedAt:serverTimestamp()});
    showToast('✅ Program updated!');
    loadSection('programs');
  } catch(e) { showToast(e.message,'error'); }
};

window.deleteProgram = async function(colName, progId) {
  if (!confirm('Delete this program? This cannot be undone.')) return;
  try {
    await deleteDoc(doc(db, colName, progId));
    showToast('Program deleted');
    loadSection('programs');
  } catch(e) {
    showToast(e.message, 'error');
  }
};
</script>

<style>
:root{--navy:#1B2A6B;--red:#E63329;--gold:#F5A623;--white:#FFFFFF;--light:#F8F9FF;--gray:#6B7280;--dark:#0D1B4B;--green:#27AE60;--sidebar:240px;}

.login-card input{width:100%;background:var(--light);border:1.5px solid rgba(27,42,107,0.15);color:var(--navy);padding:0.85rem 1rem;border-radius:12px;font-family:'Poppins',sans-serif;font-size:0.9rem;outline:none;text-align:center;letter-spacing:2px;margin-bottom:1rem;}
.btn-login{width:100%;background:var(--red);color:var(--white);padding:0.9rem;border-radius:50px;font-family:'Poppins',sans-serif;font-size:1rem;font-weight:700;border:none;cursor:pointer;}

.login-back{display:block;margin-top:1rem;color:var(--gray);font-size:0.82rem;text-decoration:none;}

/* DASHBOARD */
#screen-dashboard{display:none;min-height:100vh;}

/* SIDEBAR */
.admin-sidebar{width:var(--sidebar);background:var(--dark);position:fixed;top:0;left:0;bottom:0;z-index:50;overflow-y:auto;display:flex;flex-direction:column;}

.btn-logout-admin{display:flex;align-items:center;gap:0.5rem;color:rgba(255,255,255,0.5);font-size:0.82rem;background:none;border:none;cursor:pointer;padding:0.5rem;transition:color 0.2s;}

/* MAIN */
.admin-main{margin-left:var(--sidebar);display:flex;flex-direction:column;min-height:100vh;}

.admin-topbar-left h1{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:900;color:var(--navy);}

.admin-topbar-right a{font-size:0.82rem;color:var(--navy);text-decoration:none;padding:0.5rem 1rem;border-radius:8px;border:1px solid rgba(27,42,107,0.15);}

}

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>emailjs.init('NyhRgF1xCbrxy7XEG');
window.loadRecommendations = async function(c) {
  const [pendingSnap, allSnap] = await Promise.all([
    getDocs(query(collection(db,'recommendations'), where('status','==','pending'), orderBy('createdAt','desc'))),
    getDocs(query(collection(db,'recommendations'), orderBy('createdAt','desc')))
  ]);

  let html = '<div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;">'
    + '<h2 style="font-size:1.2rem;font-weight:900;color:var(--navy);">📝 Recommendation Letter Requests</h2>'
    + '<span style="background:var(--red);color:#fff;padding:0.2rem 0.75rem;border-radius:50px;font-size:0.8rem;font-weight:700;">'+ pendingSnap.size +' Pending</span>'
    + '</div>';

  // Filter tabs
  html += '<div style="display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap;">'
    + '<button class="btn-sm btn-navy" onclick="filterRecs("all")">All ('+allSnap.size+')</button>'
    + '<button class="btn-sm btn-outline" onclick="filterRecs("pending")">⏳ Pending ('+pendingSnap.size+')</button>'
    + '<button class="btn-sm btn-outline" onclick="filterRecs("approved")">✅ Approved</button>'
    + '<button class="btn-sm btn-outline" onclick="filterRecs("rejected")">❌ Rejected</button>'
    + '</div>';

  html += '<div id="recs-container">';

  if (allSnap.empty) {
    html += '<div class="section-card"><p style="color:var(--gray);text-align:center;padding:2rem;">No recommendation requests yet.</p></div>';
  } else {
    allSnap.docs.forEach(d => {
      const r = d.data();
      const date = r.createdAt?.toDate ? r.createdAt.toDate().toLocaleDateString() : 'Unknown date';
      const statusColor = r.status === 'approved' ? 'var(--green,#27AE60)' : r.status === 'rejected' ? 'var(--red)' : 'var(--gold)';
      const statusLabel = r.status === 'approved' ? '✅ Approved' : r.status === 'rejected' ? '❌ Rejected' : '⏳ Pending';

      html += '<div class="section-card rec-card" data-status="'+(r.status||'pending')+'" style="margin-bottom:1rem;">'
        + '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:0.75rem;margin-bottom:1rem;">'
        + '<div>'
        + '<p style="font-size:1rem;font-weight:800;color:var(--navy);">'+(r.memberName||r.userName||'Unknown Member')+'</p>'
        + '<p style="font-size:0.78rem;color:var(--gray);">📧 '+(r.memberEmail||r.userEmail||'')+'</p>'
        + '<p style="font-size:0.78rem;color:var(--gray);">📅 Submitted: '+date+'</p>'
        + '</div>'
        + '<span style="background:'+statusColor+'22;color:'+statusColor+';padding:0.3rem 0.9rem;border-radius:50px;font-size:0.78rem;font-weight:700;">'+statusLabel+'</span>'
        + '</div>'
        + '<div style="background:var(--light);border-radius:12px;padding:1rem;margin-bottom:1rem;">'
        + '<p style="font-size:0.82rem;font-weight:700;color:var(--navy);margin-bottom:0.5rem;">🎓 Scholarship / Program</p>'
        + '<p style="font-size:0.88rem;color:var(--navy);">'+(r.scholarship||r.program||'Not specified')+'</p>'
        + '</div>'
        + '<div style="background:var(--light);border-radius:12px;padding:1rem;margin-bottom:1rem;">'
        + '<p style="font-size:0.82rem;font-weight:700;color:var(--navy);margin-bottom:0.5rem;">👤 Requested Recommender</p>'
        + '<p style="font-size:0.88rem;color:var(--navy);">'+(r.recommender||'Not specified')+'</p>'
        + '</div>'
        + '<div style="background:var(--light);border-radius:12px;padding:1rem;margin-bottom:1rem;">'
        + '<p style="font-size:0.82rem;font-weight:700;color:var(--navy);margin-bottom:0.5rem;">📝 Purpose / Why They Should Be Recommended</p>'
        + '<p style="font-size:0.88rem;color:var(--gray);line-height:1.6;">'+(r.purpose||r.message||r.reason||'No reason provided')+'</p>'
        + '</div>'
        + '<div style="background:var(--light);border-radius:12px;padding:1rem;margin-bottom:1rem;">'
        + '<p style="font-size:0.82rem;font-weight:700;color:var(--navy);margin-bottom:0.5rem;">⏰ Deadline</p>'
        + '<p style="font-size:0.88rem;color:var(--navy);">'+(r.deadline||'Not specified')+'</p>'
        + '</div>'
        + (r.status === 'pending' ?
          '<div style="display:flex;gap:0.75rem;flex-wrap:wrap;">'
          + '<button class="btn-primary" style="width:auto;padding:0.6rem 1.5rem;" onclick="approveRecLetter(\'' + d.id + '\',\'' + encodeURIComponent(r.memberName||r.userName||'') + '\',\'' + encodeURIComponent(r.scholarship||'') + '\')">✅ Approve & Generate Letter</button>'
          + '<button class="btn-sm btn-red" style="padding:0.6rem 1.5rem;" onclick="rejectRecLetter(\'' + d.id + '\')">❌ Reject</button>'
          + '</div>'
          : r.status === 'approved' ?
          '<p style="font-size:0.78rem;color:var(--green,#27AE60);font-weight:600;">✅ Approved — Member can now download the letter</p>'
          : '<p style="font-size:0.78rem;color:var(--red);font-weight:600;">❌ Rejected</p>'
        )
        + '</div>';
    });
  }

  html += '</div>';
  c.innerHTML = html;
}

window.filterRecs = function(status) {
  document.querySelectorAll('.rec-card').forEach(card => {
    card.style.display = status === 'all' || card.dataset.status === status ? 'block' : 'none';
  });
}
</script>
