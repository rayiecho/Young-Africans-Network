// ===== AUTH =====
function checkAuth() {
  const auth = sessionStorage.getItem('yan_admin');
  if (auth !== 'true') {
    document.getElementById('screen-login').style.display = 'flex';
    document.getElementById('screen-dashboard').style.display = 'none';
  } else {
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-dashboard').style.display = 'flex';
    loadSection('overview');
  }
}

window.doAdminLogin = function() {
  const pass = document.getElementById('admin-pass').value;
  if (pass === ADMIN_PASSWORD) {
    sessionStorage.setItem('yan_admin', 'true');
    checkAuth();

  }
};

window.doAdminLogout = function() {

// ===== UTILS =====
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}
function timeAgo(ts) {
  if (!ts) return '';
  const t = ts.toMillis ? ts.toMillis() : (ts.seconds ? ts.seconds*1000 : ts);
  const diff = Math.floor((Date.now() - t) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}
function sanitize(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

async function uploadToCloudinary(file) {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLOUDINARY_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, { method: 'POST', body: fd });
  const data = await res.json();
  return data.secure_url || '';
}

window.loadSection = async function(section) {

  if (btn) btn.classList.add('active');

    overview: '📊 Dashboard Overview',
    gallery: '📸 Gallery Manager',
    team: '👥 Team Manager',
    stories: '📖 Journey Stories Manager',
    events: '📅 Events Manager',
    materials: '📚 Training Materials',
    certificates: '🏆 Certificate Manager',
    members: '👥 Members Manager',
    moderation: '🛡️ Community Moderation'
  }[section] || section;
  const container = document.getElementById('content-area');
  container.innerHTML = '<div class="loading">Loading...</div>';
  const fns = { overview: loadOverview, gallery: loadGallery, team: loadTeam, stories: loadStories, events: loadEvents, materials: loadMaterials, certificates: loadCertificates, members: loadMembers, moderation: loadModeration };
  if (fns[section]) await fns[section](container);
};

window.toggleGalleryFields = function() {
  const type = document.getElementById('gal-type').value;
  document.getElementById('gal-photo-field').style.display = type === 'photo' ? 'block' : 'none';
  document.getElementById('gal-video-field').style.display = type === 'video' ? 'block' : 'none';
};

window.addGalleryItem = async function() {
  const type = document.getElementById('gal-type').value;
  const caption = document.getElementById('gal-caption').value.trim();
  const category = document.getElementById('gal-category').value;
  let url = '';
  if (type === 'photo') {
    const file = document.getElementById('gal-photo').files[0];
    if (!file) return showToast('Select a photo', 'error');
    showToast('Uploading...');
    url = await uploadToCloudinary(file);
  } else {
    url = document.getElementById('gal-video-url').value.trim();
    if (!url) return showToast('Enter YouTube URL', 'error');
  }
  await addDoc(collection(db, 'gallery'), { type, url, caption, category, createdAt: serverTimestamp() });
  showToast('Gallery item added ✅');
  loadGalleryItems();
};

window.loadGalleryItems = async function loadGalleryItems() {
  const container = document.getElementById('gallery-list');
  if (!container) return;
  const snap = await getDocs(query(collection(db, 'gallery'), orderBy('createdAt', 'desc')));
  if (snap.empty) { container.innerHTML = '<p style="color:var(--gray);">No gallery items yet.</p>'; return; }
  container.innerHTML = snap.docs.map(d => {
    const g = d.data();
    const preview = g.type === 'photo'
      ? `<img src="${sanitize(g.url)}" alt="${sanitize(g.caption)}">`
      : `<div class="video-thumb">🎬 ${sanitize(g.caption||'Video')}</div>`;
    return `
    <div class="gallery-item-card">
      ${preview}
      <div class="gallery-item-info">
        <p>${sanitize(g.caption||'')}</p>
        <span>${sanitize(g.category||'')} · ${sanitize(g.type)}</span>
      </div>
      <button class="btn-delete" onclick="deleteItem('gallery','${d.id}',window.loadGalleryItems)"">🗑️</button>
    </div>`;
  }).join('');
}

window.toggleAdminDeptField = function() {
  const cat = document.getElementById('team-category').value;
  const deptGroup = document.getElementById('admin-dept-group');
  if (deptGroup) deptGroup.style.display = (cat === 'DeptHead' || cat === 'Volunteer') ? 'block' : 'none';
};

window.previewAdminTeamPhoto = function(input) {
  const file = input.files[0];
  if (!file) return;
  const preview = document.getElementById('admin-team-photo-preview');
  const reader = new FileReader();
  reader.onload = e => { preview.src = e.target.result; preview.style.display = 'block'; };
  reader.readAsDataURL(file);
};

window.addTeamMember = async function() {
  const name = document.getElementById('team-name').value.trim();
  const role = document.getElementById('team-role').value.trim();
  const country = document.getElementById('team-country').value.trim();
  const category = document.getElementById('team-category').value;
  const dept = document.getElementById('team-dept')?.value || '';
  const email = document.getElementById('team-email').value.trim();
  const order = parseInt(document.getElementById('team-order').value) || 10;
  const file = document.getElementById('team-photo').files[0];
  if (!name || !role || !country) return showToast('Fill required fields', 'error');
  if ((category === 'DeptHead' || category === 'Volunteer') && !dept) return showToast('Select a department', 'error');
  let photoUrl = '';
  if (file) { showToast('Uploading photo...'); photoUrl = await uploadToCloudinary(file); }
  await addDoc(collection(db, 'team'), { name, role, country, category, department: dept, email, photoUrl, order, createdAt: serverTimestamp() });
  showToast('Team member added ✅');
  loadTeamMembers();
};

window.loadTeamMembers = async function() {
  const container = document.getElementById('team-list');
  if (!container) return;
  const snap = await getDocs(query(collection(db, 'team'), orderBy('order', 'asc')));
  if (snap.empty) { container.innerHTML = '<p style="color:var(--gray);">No team members yet.</p>'; return; }
  container.innerHTML = `<div class="list-table">
    <div class="list-header"><span>Photo</span><span>Name</span><span>Role</span><span>Country</span><span>Action</span></div>
    ${snap.docs.map(d => {
      const t = d.data();
      return `<div class="list-row">
        <span>${t.photoUrl ? `<img src="${sanitize(t.photoUrl)}" class="list-avatar">` : `<div class="list-avatar-placeholder">${(t.name||'?')[0]}</div>`}</span>

      </div>`;
    }).join('')}
  </div>`;
}

          <p style="color:var(--gray);font-size:0.78rem;">${sanitize(e.description?.substring(0,80))}...</p>
        </div>
      </div>
      <div style="display:flex;gap:0.5rem;flex-direction:column;">
        <select onchange="updateEventStatus('${d.id}',this.value)" class="status-select">
          <option value="upcoming" ${e.status==='upcoming'?'selected':''}>Upcoming</option>
          <option value="past" ${e.status==='past'?'selected':''}>Past</option>
        </select>
        <button class="btn-delete" onclick="deleteItem('events','${d.id}',loadEventsList)">🗑️ Delete</button>
      </div>
    </div>`;
  }).join('');
}

window.updateEventStatus = async function(eventId, status) {
  await updateDoc(doc(db, 'events', eventId), { status });
  showToast('Status updated ✅');
};

// ===== TRAINING MATERIALS =====
async function loadMaterials(c) {
  c.innerHTML = `
    <div class="section-card">
      <h3>➕ Post Training Material</h3>
      <div class="form-grid">
        <div class="form-group">
          <label>Department *</label>
          <select id="mat-dept">
            ${DEPARTMENTS.map(d => `<option value="${d.id}">${d.icon} ${d.name}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label>Title *</label>
          <input type="text" id="mat-title" placeholder="Material title">
        </div>
        <div class="form-group">
          <label>Type</label>
          <select id="mat-type" onchange="toggleMatFields()">
            <option value="video">📹 Video (YouTube)</option>
            <option value="article">📄 Article</option>
          </select>
        </div>
        <div class="form-group" id="mat-url-field">
          <label>YouTube URL *</label>
          <input type="text" id="mat-url" placeholder="https://youtube.com/watch?v=...">
        </div>
        <div class="form-group" id="mat-link-field" style="display:none;">
          <label>Article Link (optional)</label>
          <input type="text" id="mat-link" placeholder="https://...">
        </div>
        <div class="form-group" id="mat-text-field" style="display:none;grid-column:1/-1;">
          <label>Article Text (optional)</label>
          <textarea id="mat-text" rows="4" placeholder="Paste article content..."></textarea>
        </div>
      </div>
      <button class="btn-primary" onclick="addMaterial()">Post Material</button>
    </div>
    <div class="section-card">
      <h3>📚 All Training Materials</h3>
      <div class="dept-filter">
        ${DEPARTMENTS.map(d => `<button class="dept-filter-btn" onclick="filterMaterials('${d.id}')">${d.icon} ${d.name.split('&')[0].trim()}</button>`).join('')}
      </div>
      <div id="materials-list"></div>
    </div>`;
  filterMaterials(DEPARTMENTS[0].id);
}

window.toggleMatFields = function() {
  const type = document.getElementById('mat-type').value;
  document.getElementById('mat-url-field').style.display = type === 'video' ? 'block' : 'none';
  document.getElementById('mat-link-field').style.display = type === 'article' ? 'block' : 'none';
  document.getElementById('mat-text-field').style.display = type === 'article' ? 'block' : 'none';
};

window.addMaterial = async function() {
  const dept = document.getElementById('mat-dept').value;
  const title = document.getElementById('mat-title').value.trim();
  const type = document.getElementById('mat-type').value;
  const url = document.getElementById('mat-url')?.value.trim() || '';
  const link = document.getElementById('mat-link')?.value.trim() || '';
  const text = document.getElementById('mat-text')?.value.trim() || '';
  if (!title) return showToast('Enter a title', 'error');
  await addDoc(collection(db, 'departments', dept, 'materials'), {
    title, type, url: url||link, text, postedBy: 'admin', postedByName: 'Admin',
    createdAt: serverTimestamp(), viewers: {}
  });
  showToast('Material posted ✅');
  filterMaterials(dept);
};

window.filterMaterials = async function(dept) {
  document.querySelectorAll('.dept-filter-btn').forEach(b => b.classList.remove('active'));
  const btn = [...document.querySelectorAll('.dept-filter-btn')].find(b => b.onclick?.toString().includes(dept));
  if (btn) btn.classList.add('active');
  const container = document.getElementById('materials-list');
  if (!container) return;
  const snap = await getDocs(query(collection(db, 'departments', dept, 'materials'), orderBy('createdAt', 'desc')));
  if (snap.empty) { container.innerHTML = '<p style="color:var(--gray);padding:1rem;">No materials for this department yet.</p>'; return; }
  container.innerHTML = snap.docs.map(d => {
    const m = d.data();
    const viewers = Object.keys(m.viewers||{}).length;
    return `
    <div class="list-item-card">
      <div class="list-item-info">
        <div class="list-avatar-placeholder">${m.type==='video'?'📹':'📄'}</div>
        <div>
          <strong>${sanitize(m.title)}</strong>
          <p>${sanitize(m.type)} · 👁️ ${viewers} viewed · ${timeAgo(m.createdAt)}</p>
          ${m.url ? `<a href="${sanitize(m.url)}" target="_blank" style="color:var(--red);font-size:0.78rem;">View →</a>` : ''}
        </div>
      </div>
      <button class="btn-delete" onclick="deleteDeptMaterial('${dept}','${d.id}')">🗑️ Delete</button>
    </div>`;
  }).join('');
};

window.deleteDeptMaterial = async function(dept, matId) {
  if (!confirm('Delete this material?')) return;
  await deleteDoc(doc(db, 'departments', dept, 'materials', matId));
  showToast('Deleted ✅');
  filterMaterials(dept);
};

// ===== CERTIFICATES =====
async function loadCertificates(c) {
  const snap = await getDocs(query(collection(db, 'certificates'), orderBy('requestedAt', 'desc')));
  c.innerHTML = `
    <div class="section-card">
      <h3>🏆 Certificate Requests</h3>
      ${snap.empty ? '<p style="color:var(--gray);">No certificate requests yet.</p>' :
        snap.docs.map(d => {
          const cert = d.data();
          const dept = DEPARTMENTS.find(x => x.id === cert.department);
          return `
          <div class="list-item-card">
            <div class="list-item-info">
              <div class="list-avatar-placeholder">${dept?.icon||'🏆'}</div>
              <div>
                <strong>${sanitize(cert.userName)}</strong>
                <p>${sanitize(dept?.name||cert.department)}</p>
                <p>Status: <span class="cert-status ${cert.status}">${cert.status}</span> · ${timeAgo(cert.requestedAt)}</p>
                ${cert.approvedBy ? `<p style="font-size:0.75rem;color:var(--gray);">Approved by: ${sanitize(cert.approvedBy)}</p>` : ''}
              </div>
            </div>
            <div style="display:flex;gap:0.5rem;flex-direction:column;">
              ${cert.status==='pending' ? `
                <button class="btn-approve" onclick="adminApproveCert('${d.id}')">✅ Approve</button>
                <button class="btn-delete" onclick="adminRejectCert('${d.id}')">❌ Reject</button>` :
                `<span class="cert-status ${cert.status}" style="font-size:0.82rem;font-weight:600;">${cert.status.toUpperCase()}</span>`}
            </div>
          </div>`;
        }).join('')}
    </div>`;
}

window.adminApproveCert = async function(certId) {
  await updateDoc(doc(db, 'certificates', certId), { status: 'approved', approvedBy: 'Admin', approvedAt: serverTimestamp() });
  showToast('Certificate approved! 🏆');
  loadSection('certificates');
};
window.adminRejectCert = async function(certId) {
  await updateDoc(doc(db, 'certificates', certId), { status: 'rejected' });
  showToast('Certificate rejected');
  loadSection('certificates');
};

// ===== MEMBERS =====
async function loadMembers(c) {
  const snap = await getDocs(collection(db, 'users'));
  c.innerHTML = `
    <div class="section-card">
      <h3>👥 All Members (${snap.size})</h3>
      <div class="list-table">
        <div class="list-header"><span>Member</span><span>Department</span><span>Country</span><span>Role</span><span>Actions</span></div>
        ${snap.docs.map(d => {
          const u = d.data();
          const dept = DEPARTMENTS.find(x => x.id === u.department);
          return `
          <div class="list-row">
            <span>
              ${u.photoUrl ? `<img src="${sanitize(u.photoUrl)}" class="list-avatar">` : `<div class="list-avatar-placeholder">${(u.name||'?')[0]}</div>`}
              <div style="display:inline-block;vertical-align:middle;margin-left:0.5rem;">
                <strong style="font-size:0.85rem;">${sanitize(u.name)}</strong><br>
                <small style="color:var(--gray);">${sanitize(u.email)}</small>
              </div>
            </span>
            <span>${sanitize(dept?.name||u.department||'')}</span>
            <span>📍 ${sanitize(u.country||'')}</span>
            <span>
              ${u.isAdmin?'🛡️ Admin ':''} 
              ${u.isDeptHead?'👑 Head ':''} 
              ${u.isExec?'⭐ Exec ':''} 
              ${!u.isAdmin&&!u.isDeptHead&&!u.isExec?sanitize(u.role||'Member'):''}
            </span>
            <span style="display:flex;gap:0.35rem;flex-wrap:wrap;">
              <button class="btn-sm-action" onclick="adminToggleRole('${d.id}','isDeptHead',${!u.isDeptHead})">${u.isDeptHead?'Remove Head':'Make Head'}</button>
              <button class="btn-sm-action" onclick="adminToggleRole('${d.id}','isAdmin',${!u.isAdmin})">${u.isAdmin?'Remove Admin':'Make Admin'}</button>
              <select onchange="adminChangeDept('${d.id}',this.value)" class="btn-sm-action" style="cursor:pointer;">
                <option value="">Move Dept...</option>
                <option value="programs" ${u.department==='programs'?'selected':''}>💻 Programs</option>
                <option value="scholarships" ${u.department==='scholarships'?'selected':''}>🏆 Scholarships</option>
                <option value="career" ${u.department==='career'?'selected':''}>🎤 Career</option>
                <option value="community" ${u.department==='community'?'selected':''}>🌍 Community</option>
                <option value="mental" ${u.department==='mental'?'selected':''}>💚 Mental Health</option>
              </select>
              <button class="btn-delete" onclick="adminRemoveMember('${d.id}')">Remove</button>
            </span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

window.adminChangeDept = async function(userId, dept) {
  if (!dept) return;
  try {
    await updateDoc(doc(db,'users',userId),{ department: dept, departments: [dept] });
    showToast('Department updated ✅');
    loadSection('members');
  } catch(e) { showToast(e.message,'error'); }
};
window.adminToggleRole = async function(userId, role, value) {
  try {
    await updateDoc(doc(db, 'users', userId), { [role]: value });
    showToast('Role updated ✅');
    loadSection('members');
  } catch(e) {
    showToast(e.message, 'error');
  }
};
window.adminRemoveMember = async function(userId) {
  if (!confirm('Remove this member from the community?')) return;
  await deleteDoc(doc(db, 'users', userId));
  showToast('Member removed');
  loadSection('members');
};

async function loadModeration(c) {
  const postsSnap = await getDocs(query(collection(db, 'posts'), orderBy('createdAt', 'desc')));

            <button class="btn-delete" onclick="adminDeletePost('${d.id}')">🗑️ Delete</button>
          </div>`;
        }).join('')}

}

window.adminDeletePost = async function(postId) {
  if (!confirm('Delete this post?')) return;
  await deleteDoc(doc(db, 'posts', postId));
  showToast('Post deleted');
  loadSection('moderation');
};

// ===== SHARED DELETE =====
window.deleteItem = async function(collectionName, docId, reloadFn) {
  if (!confirm('Delete this item?')) return;
  try {
    await deleteDoc(doc(db, collectionName, docId));
    showToast('Deleted ✅');
    if (reloadFn) reloadFn();
  } catch(e) {
    showToast(e.message, 'error');
  }
};

.list-row span{font-size:0.82rem;color:var(--navy);}
.list-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;vertical-align:middle;}
.list-avatar-placeholder{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--navy),var(--red));display:inline-flex;align-items:center;justify-content:center;font-weight:700;color:var(--white);font-size:0.85rem;}

/* LIST ITEM CARD */
.list-item-card{display:flex;align-items:center;justify-content:space-between;background:var(--light);border-radius:12px;padding:1rem 1.25rem;margin-bottom:0.75rem;gap:1rem;flex-wrap:wrap;}
.list-item-info{display:flex;align-items:center;gap:0.75rem;flex:1;min-width:200px;}
.list-item-info strong{font-size:0.88rem;color:var(--navy);}
.list-item-info p{font-size:0.75rem;color:var(--gray);}

/* DEPT FILTER */
.dept-filter{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem;}
.dept-filter-btn{background:var(--light);border:1.5px solid rgba(27,42,107,0.15);color:var(--navy);padding:0.5rem 1rem;border-radius:50px;font-family:'Poppins',sans-serif;font-size:0.78rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
.dept-filter-btn.active,.dept-filter-btn:hover{background:var(--navy);color:var(--white);border-color:var(--navy);}

/* STATUS */
.status-badge{font-size:0.72rem;font-weight:600;padding:0.2rem 0.6rem;border-radius:50px;}
.status-badge.upcoming,.cert-status.pending{background:rgba(245,166,35,0.15);color:#b37800;}
.status-badge.past,.cert-status.approved{background:rgba(39,174,96,0.15);color:var(--green);}
.cert-status.rejected{background:rgba(230,51,41,0.1);color:var(--red);}
.status-select{background:var(--light);border:1px solid rgba(27,42,107,0.15);color:var(--navy);padding:0.35rem 0.5rem;border-radius:8px;font-family:'Poppins',sans-serif;font-size:0.78rem;outline:none;}

/* LOADING */
.loading{text-align:center;padding:3rem;color:var(--gray);}

/* RESPONSIVE */
@media(max-width:1024px){
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .overview-grid{grid-template-columns:1fr;}
  .gallery-grid{grid-template-columns:repeat(3,1fr);}
  .list-header,.list-row{grid-template-columns:2fr 1.5fr 1fr 2fr;}
  .list-header span:nth-child(3),.list-row span:nth-child(3){display:none;}
}
@media(max-width:768px){
  :root{--sidebar:0px;}
  .admin-sidebar{transform:translateX(-100%);transition:transform 0.3s;width:240px;}
  .admin-sidebar.open{transform:translateX(0);}
  .admin-main{margin-left:0;}
  .form-grid{grid-template-columns:1fr;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .gallery-grid{grid-template-columns:repeat(2,1fr);}
  #content-area{padding:1.25rem;}
  .list-header,.list-row{grid-template-columns:2fr 1fr 2fr;font-size:0.75rem;}
  .list-header span:nth-child(2),.list-header span:nth-child(3),.list-row span:nth-child(2),.list-row span:nth-child(3){display:none;}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr;}
  .gallery-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-card">
    <img src="images/logo.jpeg" alt="YAN Logo">
    <h2>Admin Dashboard</h2>
    <p>Young Africans Network — Content Management System</p>
    <input type="password" id="admin-pass" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doAdminLogin()">
    <button class="btn-login" onclick="doAdminLogin()">Access Dashboard 🛡️</button>
    <a href="index.html" class="login-back">← Back to website</a>
  </div>
</div>

<!-- DASHBOARD -->
<div id="screen-dashboard">

  <!-- SIDEBAR -->
  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="admin-sidebar-logo">
      <img src="images/logo.jpeg" alt="YAN">
      <div>Young Africans Network <span>Admin CMS</span></div>
    </div>
    <nav class="admin-nav">
      <button class="nav-item" data-section="overview" onclick="loadSection('overview')"><span class="nav-icon">📊</span> Overview</button>
      <button class="nav-item" data-section="gallery" onclick="loadSection('gallery')"><span class="nav-icon">📸</span> Gallery</button>
      <button class="nav-item" data-section="team" onclick="loadSection('team')"><span class="nav-icon">👥</span> Team</button>
      <button class="nav-item" data-section="stories" onclick="loadSection('stories')"><span class="nav-icon">📖</span> Journey Stories</button>
      <button class="nav-item" data-section="events" onclick="loadSection('events')"><span class="nav-icon">📅</span> Events</button>
      <button class="nav-item" data-section="materials" onclick="loadSection('materials')"><span class="nav-icon">📚</span> Training Materials</button>
      <button class="nav-item" data-section="certificates" onclick="loadSection('certificates')"><span class="nav-icon">🏆</span> Certificates</button>
      <button class="nav-item" data-section="members" onclick="loadSection('members')"><span class="nav-icon">🌍</span> Members</button>
      <button class="nav-item" data-section="moderation" onclick="loadSection('moderation')"><span class="nav-icon">🛡️</span> Moderation</button>
    </nav>
    <div class="admin-sidebar-footer">
      <button class="btn-logout-admin" onclick="doAdminLogout()">🚪 Sign Out</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="admin-main">
    <div class="admin-topbar">
      <div class="admin-topbar-left">
        <button style="background:none;border:none;cursor:pointer;padding:4px;display:flex;flex-direction:column;gap:4px;" onclick="document.getElementById('admin-sidebar').classList.toggle('open')">
          <span style="display:block;width:22px;height:2px;background:var(--navy);border-radius:2px;"></span>
          <span style="display:block;width:22px;height:2px;background:var(--navy);border-radius:2px;"></span>
          <span style="display:block;width:22px;height:2px;background:var(--navy);border-radius:2px;"></span>
        </button>
        <h1>YAN Admin</h1>
        <span id="section-title">📊 Dashboard Overview</span>
      </div>
      <div class="admin-topbar-right">
        <a href="index.html">← Main Site</a>
      </div>
    </div>
    <div id="content-area">
      <div class="loading">Loading dashboard...</div>
    </div>
  </main>
</div>

<script>
document.addEventListener('click', function(e) {
  const sidebar = document.getElementById('admin-sidebar');
  if (sidebar && !sidebar.contains(e.target) && !e.target.closest('button[onclick*="classList.toggle"]')) {
    sidebar.classList.remove('open');
  }
});
</script>
</body>
